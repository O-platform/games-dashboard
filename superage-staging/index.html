      <div class="chart-container h300"><canvas id="ret-camp-unsub-rate"></canvas></div>
      <div class="insight">Line = <strong>SUM(<code>Unsubscribed</code>) ÷ SUM(<code>Recipients</code>) × 100</strong> per month, both columns from <code>Campaigns</code> (filter <code>Recipients &gt; 95</code>). Counts only subscribers who clicked the unsub link in a campaign sent that month — distinct from the list-churn-per-send rate (which includes hard bounces and manual deletions). Months with no qualifying send show no point. <em>Note: <code>Recipients</code> is per-send and not deduplicated across campaigns — a subscriber receiving 4 emails contributes 4× to the denominator, so the rate is per-impression, not per-unique-person.</em></div>
    </div>

    <div class="chart-card" style="margin-top:18px;">
      <h3>Campaign Complaint Rate <span class="badge-inline">— pure-Campaigns, <code>SpamComplaints ÷ Recipients</code></span></h3>
      <div class="chart-container h300"><canvas id="ret-camp-complaint-rate"></canvas></div>
      <div class="insight">Line = <strong>SUM(<code>SpamComplaints</code>) ÷ SUM(<code>Recipients</code>) × 100</strong> per month, both columns from <code>Campaigns</code> (filter <code>Recipients &gt; 95</code>). Counts spam/abuse reports filed against a campaign sent that month. Industry benchmark for mailbox-provider health is <strong>&lt; 0.08%</strong> (Google/Yahoo threshold); above 0.10% risks deliverability. Months with no qualifying send show no point.</div>
    </div>
    <h2 style="font-size:14px;font-weight:600;color:var(--text);margin:22px 0 10px;">Retention by Acquisition Source <span class="badge-inline" style="text-transform:none;">acquisition source → source → 'Organic'</span></h2>
    <div class="chart-card">
      <div class="tbl-wrap"><table class="dash-table">
        <thead><tr>
          <th>Source</th><th>Subscribers</th><th>Active Now</th><th>Churned</th>
          <th>Unsub ≤ 15 d</th><th>Unsub ≤ 30 d</th>
          <th title="Average lifespan in days, across churned subscribers only">Avg Lifespan (days)</th><th title="Median lifespan in days, across churned subscribers only">Median Lifespan</th>
          <th>Clickers</th><th>Clicker Rate</th><th>Unique Clicks</th><th>Clicks / Clicker</th>
        </tr></thead>
        <tbody>${(M.retention_by_source||[]).map(r => {
          const u15 = `${fmt(r.unsub_15d)} <span style="color:var(--text-muted);">(${(r.unsub_15d_rate||0).toFixed(1)}%)</span>`;
          const u30 = `${fmt(r.unsub_30d)} <span style="color:var(--text-muted);">(${(r.unsub_30d_rate||0).toFixed(1)}%)</span>`;
          return `<tr>
            <td><strong>${esc(r.source||'')}</strong></td>
            <td>${fmt(r.subscribers)}</td>
            <td>${fmt(r.active_now)}</td>
            <td>${fmt(r.churned)}</td>
            <td>${u15}</td>
            <td>${u30}</td>
            <td>${r.avg_lifespan_days != null ? r.avg_lifespan_days : '—'}</td>
            <td>${r.median_lifespan_days != null ? r.median_lifespan_days : '—'}</td>
            <td>${fmt(r.clickers)}</td>
            <td>${(r.clicker_rate||0).toFixed(1)}%</td>
            <td>${fmt(r.total_unique_clicks)}</td>
            <td>${r.avg_clicks_per_clicker != null ? Number(r.avg_clicks_per_clicker).toFixed(1) : '—'}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
      <div class="insight"><strong>Active Now</strong> = state = 'Active' AND engagement_segment NOT IN (Ghosts, Zombies, Dormant). Source buckets use the canonical source-label mapping shared with the Audience tab — see METRICS_updated.md §4 "Source label canonicalisation". <strong>Direct</strong> rolls up <code>organic</code>, <code>direct</code> and empty UTM. Lifespan is computed only across churned subscribers (avg / median days from join to unsub) — still-active subscribers haven't churned yet so they're excluded. <em>Clicker / Unique Clicks / Clicks per Clicker columns reflect click events from December 2025 onwards; the Subscribers / Active / Churned / Lifespan columns use full history.</em></div>
    </div>
  `;

  // Overlay chart: the overall "all subscribers" line (filled, thick green)
  // plus one thin line per acquisition-source bucket from
  // M.survival_curve_by_source.series. Legend at the bottom drives per-source
  // toggling; the Show all / Hide all buttons up top fan out to every
  // non-baseline dataset (see _retCurveAll). Palette has 16 entries to
  // comfortably cover ~15 canonical buckets without colour collisions.
  const sourcePalette = [
    '#0969da','#cf222e','#8250df','#9a6700','#bf3989','#1b7c83','#58a6ff','#3fb950',
    '#fb8500','#fb6f92','#7d4e00','#4f8cff','#34d399','#a78bfa','#f87171','#fbbf24'
  ];
  const bySource = (M.survival_curve_by_source && M.survival_curve_by_source.series) || [];
  const overlayLabels = (M.survival_curve_by_source && M.survival_curve_by_source.labels) || sc.labels || [];
  const datasets = [
    { label: 'All subscribers', data: sc.rates || [],
      borderColor: '#1a7f37', backgroundColor: 'rgba(26,127,55,.10)',
      tension:.3, fill:true, pointRadius:4, borderWidth:3, order:99 }
  ].concat(bySource.map((s, i) => ({
    label: `${s.label} (${(s.total||0).toLocaleString()})`,
    data: s.rates || [],
    borderColor: sourcePalette[i % sourcePalette.length],
    backgroundColor: 'transparent',
    tension: .3, fill: false, pointRadius: 3, borderWidth: 2, order: i,
    // spanGaps:false (Chart.js default) — null values break the line so young
    // cohorts don't draw a misleading flat line to Day 365.
    spanGaps: false,
  })));
  // External HTML tooltip — rendered as a positioned <div> so it can grow
  // past the chart canvas. The built-in canvas tooltip caps at the canvas
  // height; with 15+ acquisition-source lines visible, the list overflows
  // and the bottom rows get clipped. Switching to `enabled:false` +
  // `external` callback writes the same content into a DOM node we control,
  // with overflow-y:auto so every source stays readable.
  const _retTipId = 'ret-curve-tooltip';
  const _retTipEl = () => {
    let el = document.getElementById(_retTipId);
    if (el) return el;
    el = document.createElement('div');
    el.id = _retTipId;
    el.style.cssText =
      'position:absolute;background:rgba(15,20,28,0.96);color:#fff;' +
      'padding:8px 12px;border:1px solid rgba(255,255,255,0.08);' +
      'border-radius:6px;pointer-events:none;font-size:12px;line-height:1.5;' +
      'z-index:1000;max-height:70vh;overflow-y:auto;min-width:200px;' +
      'box-shadow:0 6px 24px rgba(0,0,0,0.45);opacity:0;transition:opacity .12s;';
    document.body.appendChild(el);
    return el;
  };
  window._retCurveChart = new Chart(document.getElementById('ret-curve'), {
    type: 'line',
    data: { labels: overlayLabels, datasets },
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{ display: false },
        tooltip:{
          enabled: false,
          external: (ctx) => {
            const tt = ctx.tooltip;
            const el = _retTipEl();
            if (!tt || tt.opacity === 0) { el.style.opacity = '0'; return; }
            const items = (tt.dataPoints || []).filter(p => p.parsed && p.parsed.y != null);
            if (!items.length) { el.style.opacity = '0'; return; }
            const title = tt.title && tt.title[0] ? tt.title[0] : '';
            const rows = items
              .sort((a, b) => b.parsed.y - a.parsed.y)
              .map(p => {
                const c = p.dataset.borderColor || '#888';
                return `<div style="display:flex;align-items:center;gap:8px;white-space:nowrap;">
                  <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c};"></span>
                  <span style="flex:1;">${esc(p.dataset.label || '')}</span>
                  <strong style="margin-left:10px;">${Number(p.parsed.y).toFixed(1)}%</strong>
                </div>`;
              }).join('');
            el.innerHTML = `<div style="font-weight:600;margin-bottom:6px;color:#bdc7d3;">${esc(title)}</div>${rows}`;
            // Position next to the cursor; keep it on-screen by flipping left
            // when there's not enough room on the right.
            const canvasRect = ctx.chart.canvas.getBoundingClientRect();
            const left = canvasRect.left + window.pageXOffset + tt.caretX + 12;
            const top  = canvasRect.top  + window.pageYOffset + tt.caretY + 12;
            el.style.left = `${left}px`;
            el.style.top  = `${top}px`;
            el.style.opacity = '1';
            // After it's laid out, nudge back if it overflows the viewport
            // right edge.
            requestAnimationFrame(() => {
              const r = el.getBoundingClientRect();
              if (r.right > window.innerWidth - 8) {
                el.style.left = `${canvasRect.left + window.pageXOffset + tt.caretX - r.width - 12}px`;
              }
            });
          }
        }
      },
      interaction: { mode:'index', intersect:false },
      scales:{ y:{ min:0, max:100, ticks:{ callback: v => v+'%' } } } }
  });
  // Populate the "Filter sources" dropdown — one checkbox per per-source
  // dataset (datasets[0] is the always-visible "All subscribers" baseline,
  // skipped). _retCurveToggleSrc(i, checked) flips a single dataset; the
  // All / None buttons up top route through _retCurveAll().
  const srcList = document.getElementById('ret-src-list');
  if (srcList) {
    srcList.innerHTML = datasets.slice(1).map((d, idx) => {
      const i = idx + 1; // real dataset index in the chart
      const safeLabel = esc(d.label);
      const swatch = `<span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${d.borderColor};margin-right:8px;vertical-align:middle;"></span>`;
      return `<label style="display:flex;align-items:center;gap:8px;padding:5px 8px;cursor:pointer;border-radius:4px;" onmouseover="this.style.background='var(--card-2)'" onmouseout="this.style.background=''">
        <input type="checkbox" checked onchange="_retCurveToggleSrc(${i}, this.checked)" style="cursor:pointer;">
        ${swatch}<span style="flex:1;color:var(--text);">${safeLabel}</span>
      </label>`;
    }).join('');
  }
  _retCurveUpdateSummary();

  const ld = M.lifespan_dist || {labels:[],data:[]};
  new Chart(document.getElementById('ret-lifespan'), {
    type: 'bar',
    data: { labels: ld.labels||[], datasets: [
      { label: 'Subscribers', data: ld.data||[], backgroundColor: '#0969da', borderRadius: 4 }
    ]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{ y:{ beginAtZero:true } } }
  });

  // Mixed chart: red bars = monthly unsubscribe volume (left axis), blue
  // Monthly Churn Volume — bars only. The per-send churn-rate line that
  // used to overlay this chart was moved to its own card below
  // (Campaign Unsubscribe Rate), and the bar series here is now just the
  // raw unsubscribe volume so the chart isn't trying to communicate two
  // metrics at once.
  const mc = M.monthly_churn || {labels:[],data:[],churn_pct:[],campaign_unsub_pct:[],total_sent:[],campaign_unsubs:[]};
  const labels    = mc.labels || [];
  const sends     = mc.total_sent || [];
  new Chart(document.getElementById('ret-churn'), {
    type: 'bar',
    data: { labels, datasets: [
      { label: 'Unsubscribes', data: mc.data || [],
        backgroundColor: '#cf222e', borderRadius: 4 }
    ]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{ display:false },
        tooltip:{ callbacks:{
          label: c => {
            const i = c.dataIndex;
            const sent = sends[i] || 0;
            return [
              `Unsubscribes: ${Number(c.parsed.y).toLocaleString()}`,
              sent ? `Total emails sent: ${sent.toLocaleString()}` : 'No qualifying sends this month'
            ];
          }
        }}
      },
      scales:{ y:{ beginAtZero:true, title:{ display:true, text:'Unsubscribes' } } }
    }
  });

  // Campaign Unsubscribe Rate — pure-Campaigns line: SUM(Unsubscribed) /
  // SUM(Recipients) * 100 per month, both columns from `Campaigns`. Months
  // with no qualifying send produce a null point (spanGaps keeps the line
  // continuous either side). Empty array safe — chart still renders.
  const campRate    = (mc.campaign_unsub_pct || []).map(v => v == null ? null : Number(v));
  const campUnsubs  = mc.campaign_unsubs || [];
  const campTarget = document.getElementById('ret-camp-unsub-rate');
  if (campTarget) {
    new Chart(campTarget, {
      type: 'line',
      data: { labels, datasets: [
        { label: 'Campaign unsub rate', data: campRate,
          borderColor: '#0969da', backgroundColor: 'rgba(9,105,218,.10)',
          tension: 0.3, pointRadius: 3, borderWidth: 2, fill: true, spanGaps: true }
      ]},
      options: { responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{ display:false },
          tooltip:{ callbacks:{
            label: c => {
              const v = c.parsed.y;
              const i = c.dataIndex;
              const u = campUnsubs[i] || 0;
              const s = sends[i] || 0;
              return [
                `Rate: ${v == null ? '—' : v.toFixed(3) + '%'}`,
                s ? `${u.toLocaleString()} campaign-link unsubs / ${s.toLocaleString()} sends` : 'No qualifying sends this month'
              ];
            }
          }}
        },
        scales:{
          y:{ beginAtZero:true, title:{ display:true, text:'Campaign unsub rate' },
              ticks:{ callback: v => Number(v).toFixed(2) + '%' } }
        }
      }
    });
  }

  // Campaign Complaint Rate — SUM(SpamComplaints) / SUM(Recipients) * 100.
  // Threshold reference lines at 0.08% (warning) and 0.10% (danger).
  const complaintRate   = (mc.campaign_complaint_pct || []).map(v => v == null ? null : Number(v));
  const campComplaints  = mc.campaign_complaints || [];
  const complaintTarget = document.getElementById('ret-camp-complaint-rate');
  if (complaintTarget) {
    new Chart(complaintTarget, {
      type: 'line',
      data: { labels, datasets: [
        { label: 'Campaign complaint rate', data: complaintRate,
          borderColor: '#cf222e', backgroundColor: 'rgba(207,34,46,.10)',
          tension: 0.3, pointRadius: 3, borderWidth: 2, fill: true, spanGaps: true }
      ]},
      options: { responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{ display:false },
          annotation: {
            annotations: {
              warnLine: { type:'line', yMin:0.08, yMax:0.08,
                borderColor:'rgba(210,153,34,.7)', borderWidth:1, borderDash:[4,4],
                label:{ content:'0.08% warning', display:true, position:'end', font:{size:10}, color:'rgba(210,153,34,.9)' } },
              dangerLine: { type:'line', yMin:0.10, yMax:0.10,
                borderColor:'rgba(207,34,46,.6)', borderWidth:1, borderDash:[4,4],
                label:{ content:'0.10% danger', display:true, position:'end', font:{size:10}, color:'rgba(207,34,46,.9)' } }
            }
          },
          tooltip:{ callbacks:{
            label: c => {
              const v = c.parsed.y;
              const i = c.dataIndex;
              const comp = campComplaints[i] || 0;
              const s = sends[i] || 0;
              return [
                `Rate: ${v == null ? '—' : v.toFixed(4) + '%'}`,
                s ? `${comp.toLocaleString()} complaints / ${s.toLocaleString()} sends` : 'No qualifying sends this month'
              ];
            }
          }}
        },
        scales:{
          y:{ beginAtZero:true, title:{ display:true, text:'Complaint rate' },
              ticks:{ callback: v => Number(v).toFixed(3) + '%' } }
        }
      }
    });
  }
}

/* "Filter sources" dropdown plumbing for the Retention survival overlay.
 * - _retCurveToggleMenu(e)        — open / close the panel (also closes on outside click)
 * - _retCurveToggleSrc(idx, vis)  — flip one per-source dataset's visibility
 * - _retCurveAll(visible)         — bulk-toggle every per-source dataset
 * - _retCurveUpdateSummary()      — refreshes the "N of M selected" hint on the button
 *
 * The "All subscribers" baseline (dataset index 0) is always visible. */
function _retCurveAll(visible) {
  const c = window._retCurveChart;
  if (!c) return;
  c.data.datasets.forEach((_, i) => {
    if (i === 0) return; // keep the "All subscribers" baseline visible
    c.setDatasetVisibility(i, visible);
  });
  // Keep the dropdown checkboxes in sync with the chart state.
  document.querySelectorAll('#ret-src-list input[type="checkbox"]').forEach(cb => {
    cb.checked = visible;
  });
  c.update();
  _retCurveUpdateSummary();
}
function _retCurveToggleSrc(idx, visible) {
  const c = window._retCurveChart;
  if (!c) return;
  c.setDatasetVisibility(idx, visible);
  c.update();
  _retCurveUpdateSummary();
}
function _retCurveToggleMenu(ev) {
  if (ev) ev.stopPropagation();
  const m = document.getElementById('ret-src-menu');
  const btn = document.getElementById('ret-src-btn');
  if (!m) return;
  const opening = m.style.display !== 'block';
  m.style.display = opening ? 'block' : 'none';
  if (btn) btn.setAttribute('aria-expanded', opening ? 'true' : 'false');
  // One-shot outside-click listener while the menu is open.
  if (opening) {
    setTimeout(() => {
      const closer = (e) => {
        const picker = document.getElementById('ret-src-picker');
        if (picker && !picker.contains(e.target)) {
          const mm = document.getElementById('ret-src-menu');
          if (mm) mm.style.display = 'none';
          if (btn) btn.setAttribute('aria-expanded', 'false');
          document.removeEventListener('click', closer);
        }
      };
      document.addEventListener('click', closer);
    }, 0);
  }
}
function _retCurveUpdateSummary() {
  const c = window._retCurveChart;
  const out = document.getElementById('ret-src-summary');
  if (!c || !out) return;
  const total = c.data.datasets.length - 1; // exclude baseline
  let on = 0;
  for (let i = 1; i < c.data.datasets.length; i++) {
    if (c.isDatasetVisible(i)) on++;
  }
  out.textContent = total === 0 ? '— no sources'
                  : on === total ? `— all ${total} selected`
                  : on === 0     ? `— none selected (baseline only)`
                                 : `— ${on} of ${total} selected`;
}

/* ═══════════════════════════════════════
   COHORT ANALYSIS
═══════════════════════════════════════ */
function renderCohort(M) {
  const k = M.cohort_kpis || {};
  const heatmap = M.cohort_heatmap || [];
  const tableRows = M.cohort_table || [];
  // Determine which month buckets are populated
  const monthKeys = ['m1','m2','m3','m4','m5','m6','m9','m12'];
  document.getElementById('cohort').innerHTML = `
    <div class="section-context-banner">
      <strong>Cohort Analysis</strong> — Subscribers grouped by their join month. Each cell is the % of that cohort still active N months later. Empty cells = cohort hasn't reached that age yet.
    </div>
    <div class="kpi-row">
      <div class="kpi-card accent"><div class="label">Total Cohorts</div><div class="value">${fmt(k.total_cohorts)}</div><div class="sub">Join-month groups</div></div>
      <div class="kpi-card blue"><div class="label">Best Cohort (M3)</div><div class="value" style="font-size:16px;">${esc(k.best_cohort_label||'—')}</div><div class="sub">${esc(k.best_cohort_m3||'—')} at M3</div></div>
      <div class="kpi-card red"><div class="label">Worst Cohort (M3)</div><div class="value" style="font-size:16px;">${esc(k.worst_cohort_label||'—')}</div><div class="sub">${esc(k.worst_cohort_m3||'—')} at M3</div></div>
    </div>
    <div class="chart-card">
      <h3>Cohort Retention Heatmap</h3>
      <div class="tbl-wrap" id="coh-heatmap-wrap"></div>
      <div class="insight">Each row = a monthly cohort. M1 = % still active 1 month after joining, etc. Colors: dark green ≥ 80% &middot; light green ≥ 60% &middot; amber ≥ 40% &middot; red &lt; 40%.</div>
    </div>
    <div class="chart-card">
      <h3>Cohort Performance Table <span class="badge-inline">— 2025+ cohorts only</span></h3>
      <div class="tbl-wrap"><table class="dash-table">
        <thead><tr>
          <th title="Join-month label">Cohort</th>
          <th title="Cohort size at join — total subscribers who joined in this month">Cohort Size</th>
          <th title="Still on the list today (state = Active or Bounced)">Total Subscribers</th>
          <th title="Reachable engaged subscribers — state = 'Active' AND engagement_segment NOT IN Ghosts/Zombies/Dormant">Active (Send-To)</th>
          <th title="Active (Send-To) / Cohort Size — canonical Active rule">Active % (of Cohort Size)</th>
          <th title="Churned / Cohort Size">Churn %</th>
          <th title="Campaigns with > 95 recipients sent during this cohort's join month">Campaigns Sent</th>
        </tr></thead>
        <tbody>${tableRows.map(r => `<tr>
          <td>${esc(r.cohort||'')}</td>
          <td>${fmt(r.size)}</td>
          <td>${fmt(r.total_subscribers != null ? r.total_subscribers : (Number(r.size) - Number(r.churned||0)))}</td>
          <td>${fmt(r.active_now)}</td>
          <td>${esc(r.active_pct || r.retention_pct || '—')}</td>
          <td>${esc(r.churn_rate_pct||'—')}</td>
          <td>${fmt(r.campaigns_sent)}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>
  `;

  // Build heatmap
  const heatColor = v => {
    if (v == null) return 'background:var(--card-2);color:var(--text-dim);';
    if (v >= 80) return 'background:#1a7f37;color:#fff;';
    if (v >= 60) return 'background:#2da44e;color:#fff;';
    if (v >= 40) return 'background:#9a6700;color:#fff;';
    if (v >= 20) return 'background:#d29922;color:#000;';
    return 'background:#cf222e;color:#fff;';
  };
  let html = '<table class="dash-table"><thead><tr><th class="cohort-th-sticky">Cohort</th><th>Size</th>';
  monthKeys.forEach(mk => html += `<th>M${mk.slice(1)}</th>`);
  html += '</tr></thead><tbody>';
  heatmap.forEach(row => {
    html += `<tr><td class="cohort-td-sticky">${esc(row.cohort||'')}</td><td>${fmt(row.size)}</td>`;
    monthKeys.forEach(mk => {
      const v = row[mk];
      if (v == null) html += `<td class="cohort-cell-null">—</td>`;
      else html += `<td style="${heatColor(v)}">${v.toFixed(1)}%</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  const wrap = document.getElementById('coh-heatmap-wrap');
  if (wrap) wrap.innerHTML = html;
}
</script>
</body>
</html>

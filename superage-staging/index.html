<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperAge — Brand Pulse Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f6f8fa;
    --card: #ffffff;
    --card-2: #f0f2f5;
    --card-border: #d0d7de;
    --text: #1f2328;
    --text-muted: #57606a;
    --text-dim: #8c959f;
    --accent: #0969da;
    --green: #1a7f37;
    --red: #cf222e;
    --orange: #9a6700;
    --purple: #8250df;
    --pink: #bf3989;
    --cyan: #1b7c83;
    --gold: #7d4e00;
    --blue: #0969da;
    --header-bg: linear-gradient(160deg, #dce8f5 0%, #f6f8fa 60%);
    --row-hover: #f0f2f5;
    --row-border: #e8eaed;
  }
  body.dark {
    --bg: #0d1117;
    --card: #161b22;
    --card-2: #1c2128;
    --card-border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --orange: #d29922;
    --purple: #bc8cff;
    --pink: #f778ba;
    --cyan: #39c5cf;
    --gold: #e3b341;
    --blue: #58a6ff;
    --header-bg: linear-gradient(160deg, #0d1b2e 0%, #0d1117 60%);
    --row-hover: #1c2128;
    --row-border: #30363d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  /* Header */
  .header { background: var(--header-bg); border-bottom: 1px solid var(--card-border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .sa-logo {
    flex-shrink: 0;
    width: 40px; height: 40px;
    background: transparent;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,.2);
    padding: 5px;
  }
  .sa-logo img, .sa-logo svg { width: 100%; height: 100%; filter: brightness(0) invert(1); }
  .header h1 { font-size: 19px; font-weight: 700; color: var(--text); }
  .header .sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 18px; }
  .header-meta { display: flex; flex-direction: column; gap: 2px; align-items: flex-end; }
  .header-top { display: flex; align-items: center; gap: 10px; }
  .header-date { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; }
  .header-sub-line { font-size: 11px; color: var(--text-muted); }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; line-height: 1.3; }
  .pill-blue { background: rgba(9,105,218,.12); color: var(--accent); border: 1px solid rgba(9,105,218,.30); }
  body.dark .pill-blue { background: rgba(88,166,255,.15); color: #58a6ff; border-color: rgba(88,166,255,.35); }
  .dark-switch { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .dark-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
  .dark-slider { position: relative; width: 42px; height: 22px; background: var(--card-border); border-radius: 22px; transition: background .2s; flex-shrink: 0; }
  .dark-slider:before { content: ""; position: absolute; height: 16px; width: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform .2s; box-shadow: 0 1px 2px rgba(0,0,0,.25); }
  .dark-switch input:checked + .dark-slider { background: var(--accent); }
  .dark-switch input:checked + .dark-slider:before { transform: translateX(20px); }
  .dark-label { font-size: 11px; font-weight: 700; letter-spacing: .5px; color: var(--text-muted); }
  body.dark .dark-label { color: var(--text); }
  /* Tabs */
  .tab-bar { background: var(--card); border-bottom: 1px solid var(--card-border); display: flex; overflow-x: auto; padding: 0 16px; gap: 0; }
  .tab { background: none; border: none; border-bottom: 2px solid transparent; padding: 10px 16px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: color .15s, border-color .15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  /* Pages */
  .page { display: none; padding: 20px 24px; max-width: 1280px; margin: 0 auto; }
  .page.active { display: block; }
  /* Cards */
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px,1fr)); gap: 12px; margin-bottom: 18px; }
  .kpi-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 10px; padding: 14px 16px; }
  .kpi-card .label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .kpi-card .value { font-size: 24px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .kpi-card .sub { font-size: 11px; color: var(--text-muted); }
  .kpi-card.accent .value { color: var(--accent); }
  .kpi-card.green .value { color: var(--green); }
  .kpi-card.red .value { color: var(--red); }
  .kpi-card.orange .value { color: var(--orange); }
  .kpi-card.purple .value { color: var(--purple); }
  .kpi-card.pink .value { color: var(--pink); }
  .kpi-card.cyan .value { color: var(--cyan); }
  .kpi-card.gold .value { color: var(--gold); }
  .kpi-card.blue .value { color: var(--blue); }
  /* Charts */
  .chart-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 10px; padding: 18px 20px; margin-bottom: 18px; }
  .chart-card h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
  .chart-container { position: relative; }
  /* Anchor the canvas to the chart-container so Chart.js (with responsive:true,
     maintainAspectRatio:false) can never shrink below the container's height —
     fixes the "chart becomes half size after toggling a filter" symptom. */
  .chart-container > canvas { position: absolute; inset: 0; width: 100% !important; height: 100% !important; }
  .chart-container.h220 { height: 220px; }
  .chart-container.h260 { height: 260px; }
  .chart-container.h300 { height: 300px; }
  .chart-container.h340 { height: 340px; }
  .chart-container.h380 { height: 380px; }
  .chart-container.h420 { height: 420px; }
  /* Grid layouts */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; margin-bottom: 18px; }
  @media (max-width: 860px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
  /* Tables */
  .tbl-wrap { overflow-x: auto; }
  table.dash-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.dash-table th { background: var(--card-2); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; color: var(--text-muted); padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--card-border); white-space: nowrap; }
  table.dash-table td { padding: 7px 10px; border-bottom: 1px solid var(--row-border); vertical-align: top; }
  table.dash-table td.nowrap, table.dash-table th.nowrap { white-space: nowrap; }
  table.dash-table tr:hover td { background: var(--row-hover); }
  /* Misc */
  .badge-inline { font-size: 11px; font-weight: 500; color: var(--text-muted); }
  .insight { font-size: 12px; color: var(--text-muted); margin-top: 10px; line-height: 1.5; }
  .section-context-banner { background: var(--card-2); border: 1px solid var(--card-border); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }
  .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 12px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--card-border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Article table */
  .art-row-expand { cursor: pointer; }
  .art-detail-row { display: none; }
  .art-detail-row.open { display: table-row; }
  .art-detail-cell { padding: 8px 10px 12px 30px !important; background: var(--card-2); font-size: 12px; color: var(--text-muted); }
  /* Filter row */
  .filter-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 12px; }
  .filter-row label { font-size: 12px; color: var(--text-muted); }
  .filter-row select, .filter-row input[type=text] { font-size: 12px; padding: 4px 8px; border: 1px solid var(--card-border); border-radius: 6px; background: var(--card); color: var(--text); }
  /* Campaign toolbar */
  .camp-toolbar { display:flex; align-items:center; justify-content:space-between; gap:14px; padding:12px 16px; background: var(--card); border:1px solid var(--card-border); border-radius:10px; margin-bottom:16px; }
  .camp-toolbar-left { display:flex; align-items:center; gap:12px; }
  /* iOS-style toggle */
  .switch { position: relative; display: inline-block; width: 38px; height: 22px; flex-shrink:0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider-round { position: absolute; cursor: pointer; inset: 0; background: var(--card-border); transition: .2s; border-radius: 22px; }
  .slider-round:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; top: 3px; background: #fff; transition: .2s; border-radius: 50%; box-shadow: 0 1px 2px rgba(0,0,0,.2); }
  .switch input:checked + .slider-round { background: var(--accent); }
  .switch input:checked + .slider-round:before { transform: translateX(16px); }
  /* Pager */
  .camp-pager-btn { padding:4px 9px; border-radius:5px; border:1px solid var(--card-border); background:var(--card); color:var(--text-muted); cursor:pointer; font-size:12px; transition: background .15s, color .15s; }
  .camp-pager-btn:hover:not([disabled]) { background: var(--card-2); color: var(--text); }
  .camp-pager-btn[disabled] { opacity:.4; cursor:not-allowed; }
  .camp-pager-btn.active { background: var(--accent); color:#fff; border-color: var(--accent); }
  /* Cohort */
  .cohort-cell-null { background: var(--card-2) !important; color: var(--text-dim) !important; }
  .cohort-th-sticky { position: sticky; left: 0; background: var(--card); z-index: 2; }
  .cohort-td-sticky { position: sticky; left: 0; background: var(--card); z-index: 1; white-space: nowrap; }
  .coh-nav { display: flex; gap: 6px; align-items: center; }
  .coh-nav button { font-size: 12px; padding: 3px 10px; border: 1px solid var(--card-border); border-radius: 5px; background: var(--card); color: var(--text-muted); cursor: pointer; }
  .coh-nav button:hover { background: var(--card-2); }
  /* Comparison table */
  .cmp-win { color: var(--green); font-weight: 600; }
  .cmp-lose { color: var(--red); }
  .cmp-neutral { color: var(--text-muted); }
  /* Tooltip override */
  canvas { max-width: 100%; }
</style>
</head>
<body>
<div id="loading-overlay" class="loading-overlay">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--text-muted);">Loading dashboard data…</div>
</div>
<div id="dashboard-content" style="display:none;">

<header class="header">
  <div class="header-left">
    <div class="sa-logo"><img src="./svg-sa.svg" alt="SuperAge"></div>
    <div>
      <h1>SuperAge — Brand Pulse</h1>
      <div class="sub">Campaign &amp; Audience Intelligence</div>
    </div>
  </div>
  <div class="header-right">
    <div class="header-meta">
      <div class="header-top">
        <span class="pill pill-blue">Daily updates</span>
        <span class="header-date" id="as-of-label">—</span>
      </div>
      <div class="header-sub-line">SuperAge — Brand Pulse · Last updated</div>
    </div>
    <label class="dark-switch" title="Toggle dark mode">
      <input type="checkbox" id="darkToggleInput">
      <span class="dark-slider"></span>
      <span class="dark-label">DARK</span>
    </label>
  </div>
</header>

<nav class="tab-bar" id="tab-bar">
  <button class="tab active" onclick="showPage('overview',this)">Overview</button>
  <button class="tab" onclick="showPage('campaigns',this)">Campaigns</button>
  <button class="tab" onclick="showPage('content',this)">Click Analysis</button>
  <button class="tab" onclick="showPage('content-ref',this)">Content Reference</button>
  <button class="tab" onclick="showPage('audience',this)">Audience</button>
  <button class="tab" onclick="showPage('quiz',this)">Longevity Quiz</button>
  <button class="tab" onclick="showPage('revenue',this)">Revenue &amp; Sponsors</button>
  <button class="tab" onclick="showPage('retention',this)">Subscriber Retention</button>
  <button class="tab" onclick="showPage('cohort',this)">Cohort Analysis</button>
</nav>

<div id="overview" class="page active"></div>
<div id="campaigns" class="page"></div>
<div id="content" class="page"></div>
<div id="content-ref" class="page"></div>
<div id="audience" class="page"></div>
<div id="quiz" class="page"></div>
<div id="revenue" class="page"></div>
<div id="retention" class="page"></div>
<div id="cohort" class="page"></div>

</div>

<script>
/* ═══════════════════════════════════════
   DARK MODE
═══════════════════════════════════════ */
const _dk = localStorage.getItem('sa-dark') === '1';
if (_dk) document.body.classList.add('dark');
function setDark(on) {
  document.body.classList.toggle('dark', on);
  localStorage.setItem('sa-dark', on ? '1' : '0');
}
{
  const inp = document.getElementById('darkToggleInput');
  if (inp) {
    inp.checked = _dk;
    inp.addEventListener('change', e => setDark(e.target.checked));
  }
}

/* ═══════════════════════════════════════
   TABS
═══════════════════════════════════════ */
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (btn) btn.classList.add('active');
}

/* ═══════════════════════════════════════
   UTILITIES
═══════════════════════════════════════ */
function fmt(n) {
  if (n === null || n === undefined) return '—';
  return Number(n).toLocaleString();
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function utmLabel(raw) {
  if (!raw) return '—';
  const s = String(raw).trim().toLowerCase();
  if (s === 'ahcpl1' || s === 'allhealthy') return 'AllHealthy';
  if (s === 'tdcpl1') return 'TrueDemocracy';
  if (s === 'lscpl1' || s === 'livingsimply') return 'LivingSimply';
  if (s === 'dpcpl1') return 'DailyPuzzle';
  if (s === 'hfcpl1') return 'HealthFirst';
  if (s === 'fccpl1') return 'FitConnect';
  if (['facebook','meta','fb','ig','if'].includes(s)) return 'Meta';
  if (s === 'taboola') return 'Taboola';
  if (s === 'healthbrief') return 'HealthBrief';
  if (s === 'superagequiz' || s === 'longevity_quiz') return 'SuperAge Quiz';
  return raw;
}

/* ═══════════════════════════════════════
   DATA LOAD
═══════════════════════════════════════ */
Promise.all([
  fetch('./superage-metrics.json').then(r => r.json()),
  fetch('./superage-comparison.json').then(r => r.ok ? r.json() : {}).catch(() => ({}))
])
  .then(([metrics, comparison]) => {
    const M = Object.assign({}, metrics, comparison);
    const asOf = M.data_as_of || '—';
    document.getElementById('as-of-label').textContent = asOf;
    renderOverview(M);
    renderCampaigns(M);
    renderContent(M);
    renderContentRef(M);
    renderAudience(M);
    renderQuiz(M);
    renderRevenue(M);
    renderRetention(M);
    renderCohort(M);
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('dashboard-content').style.display = 'block';
  })
  .catch(err => {
    document.getElementById('loading-overlay').innerHTML =
      '<div style="color:var(--red);font-size:16px;">Failed to load dashboard data</div>' +
      '<div style="color:var(--text-muted);font-size:12px;margin-top:8px;">' + esc(String(err.message||err)) + '</div>';
  });

/* ═══════════════════════════════════════
   OVERVIEW
═══════════════════════════════════════ */
function renderOverview(M) {
  document.getElementById('overview').innerHTML = `
    <div class="section-context-banner">
      <strong>Executive Overview</strong> — Top-line health of the SuperAge newsletter: subscriber base, campaign performance, content engagement, and revenue at a glance.
      Data refreshes daily. All figures exclude today and future-dated records.
    </div>


    <div class="kpi-row" style="grid-template-columns:repeat(4,1fr);">
      <div class="kpi-card green"><div class="label">Active (Send-to)</div><div class="value">${fmt(M.send_to_active)}</div><div class="sub">${M.send_to_rate} of subscribers whose state is Active</div></div>
      <div class="kpi-card cyan"><div class="label">Avg Open Rate</div><div class="value">${M.avg_open_rate}</div><div class="sub">Best: ${M.best_open_rate}</div></div>
      <div class="kpi-card blue"><div class="label">Avg Click Rate</div><div class="value">${M.avg_click_rate}</div><div class="sub">Best: ${M.best_click_rate}</div></div>
      <div class="kpi-card orange"><div class="label">Campaigns Sent</div><div class="value">${fmt(M.total_campaigns)}</div><div class="sub">${fmt(M.total_recipients)} total recipients</div></div>
    </div>

    <div class="kpi-row" style="grid-template-columns:repeat(4,1fr);">
      <div class="kpi-card accent"><div class="label">Total Subscribers</div><div class="value">${fmt(M.total_subscribers)}</div><div class="sub">All-time subscriber base</div></div>
      <div class="kpi-card red"><div class="label">Unsubscribed</div><div class="value">${fmt(M.unsubscribed_count)}</div><div class="sub">${M.total_subscribers ? (M.unsubscribed_count/M.total_subscribers*100).toFixed(1)+'%' : '—'} of total</div></div>
      <div class="kpi-card orange"><div class="label">Bounced</div><div class="value">${fmt(M.bounced_count)}</div><div class="sub">${M.total_subscribers ? (M.bounced_count/M.total_subscribers*100).toFixed(1)+'%' : '—'} of total</div></div>
      <div class="kpi-card purple"><div class="label">Quiz Takers</div><div class="value">${fmt(M.quiz_takers)}</div><div class="sub">${M.quiz_takers_pct}% of total subscribers</div></div>
    </div>

    <div class="grid-2">
      <div class="chart-card">
        <h3>Subscriber Status Mix</h3>
        <div class="chart-container h260"><canvas id="ov-state-donut"></canvas></div>
        <div id="ov-state-pct-table" style="margin-top:8px;font-size:12px;"></div>
        <div class="insight">
          <strong>${M.send_to_rate}</strong> of all subscribers are active (send-to).
          Unsubscribed: <strong>${M.total_subscribers ? (M.unsubscribed_count/M.total_subscribers*100).toFixed(1)+'%' : '—'}</strong> &middot;
          Bounced: <strong>${M.total_subscribers ? (M.bounced_count/M.total_subscribers*100).toFixed(1)+'%' : '—'}</strong>
        </div>
      </div>
      <div class="chart-card">
        <h3>Campaign Performance Trend <span class="badge-inline">— Open &amp; Click Rate</span></h3>
        <div class="chart-container h260"><canvas id="ov-camp-trend"></canvas></div>
        <div class="insight">
          Average open rate <strong>${M.avg_open_rate}</strong> &middot; Best campaign <strong>${M.best_open_rate}</strong>.
          Average click rate <strong>${M.avg_click_rate}</strong>.
        </div>
      </div>
    </div>

    <div class="chart-card" style="margin-bottom:18px;">
      <h3>Subscriber Growth Over Time</h3>
      <p style="font-size:12px;color:var(--text-muted);margin-top:4px;margin-bottom:10px;">Monthly new subscribers vs. unsubscribes. Net = new minus churned. Last 12 months.</p>
      <div class="chart-container h300"><canvas id="ov-growth"></canvas></div>
    </div>

    <div class="chart-card">
      <h3>Recent Campaigns Metrics</h3>
      <div class="tbl-wrap"><table class="dash-table"><thead><tr><th>#</th><th>Campaign</th><th>Sent</th><th>Recipients</th><th>Open Rate</th><th>Click Rate</th></tr></thead>
      <tbody>${([...(M.campaign_table||[])].sort((a,b)=>{const da=Date.parse(a.sent_date||'')||0;const db=Date.parse(b.sent_date||'')||0;return db-da;}).slice(0,10)).map((c,i)=>{
        const nameCell = c.url ? `<a href="${esc(c.url)}" target="_blank" rel="noopener">${esc(c.name||'')}</a>` : esc(c.name||'');
        const recip = (c.recipients == null) ? '—' : (typeof c.recipients === 'string' ? esc(c.recipients) : fmt(c.recipients));
        return `<tr><td>${i+1}</td><td>${nameCell}</td><td class="nowrap">${c.sent_date||''}</td><td>${recip}</td><td>${c.open_rate||'—'}</td><td>${c.click_rate||'—'}</td></tr>`;
      }).join('')}</tbody></table></div>
    </div>
  `;
  // Subscriber status donut
  const ss = M.subscriber_states || {labels:[], data:[]};
  const donutColors = ['#1a7f37','#58a6ff','#cf222e','#9a6700','#8250df','#bf3989','#1b7c83'];
  new Chart(document.getElementById('ov-state-donut'), {
    type: 'doughnut',
    data: { labels: ss.labels, datasets: [{ data: ss.data, backgroundColor: donutColors, borderWidth: 1 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{position:'bottom',labels:{font:{size:11},padding:8}} } }
  });
  // Status mix % table
  const pctTbl = document.getElementById('ov-state-pct-table');
  if (pctTbl && ss.labels && ss.labels.length) {
    const total = ss.data.reduce((a,b)=>a+b,0);
    const rows = ss.labels.map((lbl,i)=>{
      const cnt = ss.data[i]||0;

function _campNum(v) {
  if (v == null) return 0;
  if (typeof v === 'number') return v;
  const n = parseFloat(String(v).replace(/[,%$\s]/g,''));

}
function _campPct(v) {
  if (v == null) return null;
  if (typeof v === 'number') return v;
  const n = parseFloat(String(v).replace(/[%\s]/g,''));

}

function _renderCampKpis(rows) {
  const n = rows.length;
  const sum = (k, num) => rows.reduce((a,r) => a + num(r[k]), 0);

  const totOpens   = sum('unique_opens', _campNum);
  const totClicks  = sum('clicks',       _campNum);
  const totUnsubs  = sum('unsubs',       _campNum);
  const openRates  = rows.map(r => _campPct(r.open_rate)).filter(v => v != null);
  const clickRates = rows.map(r => _campPct(r.click_rate)).filter(v => v != null);
  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0) / arr.length : 0;
  const avgOpen  = avg(openRates);
  const avgClick = avg(clickRates);
  const bestOpen  = openRates.length  ? Math.max(...openRates)  : 0;
  const bestClick = clickRates.length ? Math.max(...clickRates) : 0;
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  set('kpi-camp-count', fmt(n));
  set('kpi-avg-open',   avgOpen.toFixed(2) + '%');

  set('kpi-best-open',  bestOpen.toFixed(2) + '%');

function _clickTrendInsight(series, metric, unit, fmtVal) {
  // Compare the LAST TWO COMPLETED periods — skip any bar flagged is_current
  // so partial weeks/months don't produce a misleading drop.
  const data = series[metric] || [];
  const isc  = series.is_current || [];
  const completed = [];
  for (let i = data.length - 1; i >= 0; i--) {
    if (!isc[i] && data[i] != null) completed.push(i);
    if (completed.length === 2) break;
  }
  if (completed.length < 2) return '';
  const cur  = Number(data[completed[0]]) || 0;
  const prev = Number(data[completed[1]]) || 0;
  if (prev === 0 && cur === 0) return '';
  const pct = prev > 0 ? ((cur - prev) / prev * 100) : 100;
  const dir = pct >= 0 ? '↑' : '↓';
  const clr = pct >= 0 ? 'var(--green)' : 'var(--red)';
  const f = fmtVal || (v => fmt(v));
  return `<strong style="color:${clr}">${dir} ${Math.abs(pct).toFixed(1)}%</strong> vs previous (${f(cur)} vs ${f(prev)} ${unit})`;
}
/* Properly tear down the old Chart instance, reset any inline sizing the
 * previous render left on the canvas, then hand a clean canvas back. Without
 * destroy() the old chart's ResizeObserver keeps firing on the old (detached)
 * canvas; without clearing style/width/height attrs Chart.js sometimes reads
 * the old size instead of the container, which is why the chart looked half-
 * size after toggling the Sunday Spotlight filter. */
function _resetCanvas(id) {
  const old = document.getElementById(id);
  if (!old) return null;
  if (old._chart) { try { old._chart.destroy(); } catch (e) {} old._chart = null; }
  const fresh = old.cloneNode(false);
  fresh.removeAttribute('style');
  fresh.removeAttribute('width');
  fresh.removeAttribute('height');
  old.parentNode.replaceChild(fresh, old);
  return fresh;
}

/* Create a chart and then force a resize on the next animation frame so it
 * recomputes against the parent container after layout settles. Belt-and-
 * braces against the "chart shrinks after toggle" Chart.js bug. */
function _newChart(ctx, cfg) {
  const c = new Chart(ctx, cfg);
  requestAnimationFrame(() => { try { c.resize(); } catch (e) {} });
  return c;
}

function _clickTrendChart(canvasId, series, metric, color, label, tickFormat) {
  const labels = series.labels || [];
  const data   = series[metric] || [];
  const cur    = series.is_current || [];
  const camps  = series.campaigns || [];
  const tickFn = tickFormat || (v => v.toLocaleString());
  const bg = data.map((_,i) => cur[i] ? color + '66' : color);
  const border = data.map((_,i) => cur[i] ? color : 'transparent');
  const ctx = _resetCanvas(canvasId);
  if (!ctx) return;
  ctx._chart = _newChart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{
      label,
      data,
      backgroundColor: bg,
      borderColor: border,
      borderWidth: 2,
      borderRadius: 4
    }]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{ display:false },
        tooltip:{ callbacks:{
          afterLabel: (c) => {
            const lines = [];
            if (camps[c.dataIndex] != null) lines.push(`Campaigns: ${camps[c.dataIndex]}`);
            if (cur[c.dataIndex]) lines.push('(in progress — excluded from comparison)');
            return lines;
          }
        }}
      },
      scales:{ y:{ beginAtZero:true, ticks:{ callback: v => tickFn(v) } } } }
  });
}

/* Raw-click section state for weekday/week-range selectors */
let _rawClicksData = null;
const _weekdayLong = { Mon:'Monday', Tue:'Tuesday', Wed:'Wednesday', Thu:'Thursday', Fri:'Friday', Sat:'Saturday', Sun:'Sunday' };

/* Click Analysis — toolbar state helpers.
 * `_ssOn()` returns true when the user wants Sunday Spotlight INCLUDED
 * (toggle checked). Default OFF (excluded), matching the Campaigns tab.
 * `_rawMetric(series)` picks the right field for raw-click series:
 *   - SS included → 'clicks'
 *   - SS excluded AND lambda emitted 'clicks_no_ss' → 'clicks_no_ss'
 *   - Otherwise fall back to 'clicks' (older lambda output).
 */
function _ssOn() {
  const el = document.getElementById('clicksIncludeSS');
  return el ? el.checked : false;
}
function _rawMetric(series) {
  if (_ssOn()) return 'clicks';
  return (series && Array.isArray(series.clicks_no_ss)) ? 'clicks_no_ss' : 'clicks';
}

/* Section 1 client-side aggregation from M.campaign_table.
 * Lets us filter Sunday Spotlight and switch between Total / Per-campaign /
 * Click-to-Open % without needing a lambda re-run.
 */
function _isoWeekStart(d) {
  const x = new Date(d);
  if (isNaN(x)) return null;
  const day = x.getDay();
  const back = day === 0 ? 6 : day - 1;
  x.setHours(0,0,0,0);
  x.setDate(x.getDate() - back);
  return x;
}
function _monthStart(d) {
  const x = new Date(d);
  if (isNaN(x)) return null;
  x.setHours(0,0,0,0);
  x.setDate(1);
  return x;
}
const _fmtWeekLabel  = d => d.toLocaleDateString('en-US', { month:'short', day:'2-digit' });
const _fmtMonthLabel = d => d.toLocaleDateString('en-US', { month:'short', year:'numeric' });

function _buildCampaignSeries(rows, periodFn, formatter, limit) {
  const today = new Date(); today.setHours(0,0,0,0);
  const todayKey = periodFn(today).getTime();
  const groups = new Map();
  rows.forEach(c => {
    const d = new Date(c.sent_date || '');
    if (isNaN(d)) return;
    const k = periodFn(d).getTime();
    if (!groups.has(k)) groups.set(k, { clicks:0, opens:0, recipients:0, n:0 });
    const g = groups.get(k);
    g.clicks     += _campNum(c.clicks);
    g.opens      += _campNum(c.unique_opens);
    g.recipients += _campNum(c.recipients);
    g.n          += 1;
  });
  let keys = [...groups.keys()].sort((a,b) => a - b);
  if (limit && keys.length > limit) keys = keys.slice(keys.length - limit);
  return {
    labels:       keys.map(k => formatter(new Date(k))),
    clicks:       keys.map(k => groups.get(k).clicks),
    per_campaign: keys.map(k => { const g = groups.get(k); return g.n ? Math.round(g.clicks / g.n) : 0; }),
    ctor:         keys.map(k => { const g = groups.get(k); return g.opens ? Number((g.clicks / g.opens * 100).toFixed(1)) : 0; }),
    campaigns:    keys.map(k => groups.get(k).n),
    unique_opens: keys.map(k => groups.get(k).opens),
    recipients:   keys.map(k => groups.get(k).recipients),
    is_current:   keys.map(k => k === todayKey)
  };
}

function _renderClickSection1() {
  const includeSS = _ssOn();
  const metric    = (document.getElementById('clicksMetric') || {}).value || 'clicks';
  const stateEl   = document.getElementById('clicks-ss-state');
  if (stateEl) stateEl.textContent = includeSS ? 'Including branded digest sends' : 'Excluding branded digest sends';
  const table = (_rawClicksData && _rawClicksData.campaign_table) || [];
  const rows  = table.filter(c => includeSS ? true : !((c.name||'').toLowerCase().includes('sunday spotlight')));
  const weekly  = _buildCampaignSeries(rows, _isoWeekStart, _fmtWeekLabel,  8);
  const monthly = _buildCampaignSeries(rows, _monthStart,  _fmtMonthLabel, 6);
  const isCtor    = metric === 'ctor';
  const isPerCamp = metric === 'per_campaign';
  const metricLabel = isPerCamp ? 'Clicks / campaign' : (isCtor ? 'Click-to-Open %' : 'Total clicks');
  const unitLabel   = isPerCamp ? 'clicks/campaign'  : (isCtor ? 'CTOR'             : 'clicks');
  const tickFmt     = isCtor ? (v => v.toFixed(1) + '%') : (v => Number(v).toLocaleString());
  const valFmt      = isCtor ? (v => Number(v).toFixed(1) + '%') : (v => Number(v).toLocaleString());
  _clickTrendChart('cnt-weekly-bar',  weekly,  metric, '#0969da', metricLabel, tickFmt);
  _clickTrendChart('cnt-monthly-bar', monthly, metric, '#1a7f37', metricLabel, tickFmt);
  const wIns = document.getElementById('cnt-weekly-insight');
  if (wIns) {
    const txt = _clickTrendInsight(weekly, metric, unitLabel, valFmt);
    wIns.innerHTML = txt
      ? `WoW (last 2 completed weeks): ${txt}. The faded bar is the current (in-progress) week — excluded from the comparison.`
      : `Not enough completed weeks for a WoW comparison yet.`;
  }
  const mIns = document.getElementById('cnt-monthly-insight');
  if (mIns) {
    const txt = _clickTrendInsight(monthly, metric, unitLabel, valFmt);
    mIns.innerHTML = txt
      ? `MoM (last 2 completed months): ${txt}. The faded bar is the current (in-progress) month — excluded from the comparison.`
      : `Not enough completed months for a MoM comparison yet.`;
  }
}

function _sliceSeries(series, n) {
  if (!series || !series.labels) return series || {};
  const len = series.labels.length;
  if (n >= len) return series;
  const sl = (arr) => Array.isArray(arr) ? arr.slice(len - n) : arr;
  const out = {};
  for (const k of Object.keys(series)) out[k] = sl(series[k]);
  return out;
}

/* Same Weekday chart — campaign-send view.
 * For each weekday (Mon–Sun), we show the last `n` campaigns sent on that
 * weekday (from M.campaign_table) with their *total clicks*. Bars are
 * coloured green when above that weekday's average and red when below,
 * with in-progress sends (< 2 days old) shown in pale grey because their
 * click totals are still accumulating.
 */
function _setWeekdayWindow(n) {
  if (!_rawClicksData) return;
  window._rawWeekdayN = n;
  ['rwd-2','rwd-3','rwd-5'].forEach(id => {
    const btn = document.getElementById(id);
    if (!btn) return;
    const active = parseInt(id.split('-')[1]) === n;
    btn.style.background = active ? 'var(--accent)' : 'var(--card)';
    btn.style.color = active ? '#fff' : 'var(--text-muted)';
  });
  const dows = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const ssOn = _ssOn();
  const today = new Date(); today.setHours(0,0,0,0);
  const inProgressCutoff = today.getTime() - 2 * 86400000;

  // Bucket every campaign by the weekday it was sent on.
  const table = (_rawClicksData && _rawClicksData.campaign_table) || [];
  const byDow = { Mon:[], Tue:[], Wed:[], Thu:[], Fri:[], Sat:[], Sun:[] };
  table.forEach(c => {
    if (!ssOn && (c.name||'').toLowerCase().includes('sunday spotlight')) return;
    const d = new Date(c.sent_date || '');
    if (isNaN(d)) return;
    const dow = dows[((d.getDay()+6) % 7)];   // 0=Mon … 6=Sun
    byDow[dow].push({
      sent:       d,
      label:      d.toLocaleDateString('en-US', { month:'short', day:'2-digit', year:'2-digit' }),
      name:       c.name || '',
      clicks:     _campNum(c.clicks),
      inProgress: d.getTime() >= inProgressCutoff
    });
  });

  // Keep the most recent `n` per weekday.
  let weekdaysWithData = 0;
  dows.forEach(d => {
    byDow[d].sort((a,b) => b.sent - a.sent);
    if (byDow[d].length) weekdaysWithData++;
    byDow[d] = byDow[d].slice(0, n);
  });

  // Average per weekday — excludes in-progress sends so their incomplete
  // totals don't drag the baseline down for the rest of the bars.
  const avgs = {};
  dows.forEach(d => {
    const done = byDow[d].filter(x => !x.inProgress);
    avgs[d] = done.length ? done.reduce((s,x) => s + x.clicks, 0) / done.length : 0;
  });

  // Build n datasets — index `positionFromEnd = n-1-i` reads "0 = most recent".
  // Each bar gets its own colour: green if ≥ that weekday's average, red if
  // below, pale grey if still in-progress (excluded from the comparison).
  const GREEN     = 'rgba(63,185,80,0.85)';
  const RED       = 'rgba(248,81,73,0.85)';
  const INP_GREY  = 'rgba(140,149,159,0.45)';
  const INP_BORDER = 'rgba(140,149,159,0.85)';
  const datasets = [];
  for (let i = 0; i < n; i++) {
    const positionFromEnd = n - 1 - i;        // 0 = most recent
    const labelTxt = positionFromEnd === 0 ? 'Most recent'
                   : positionFromEnd === 1 ? '1 week back'
                   : `${positionFromEnd} weeks back`;
    const data = dows.map(d => {
      const row = byDow[d][positionFromEnd];
      return row ? row.clicks : null;
    });
    const bg = dows.map(d => {
      const row = byDow[d][positionFromEnd];
      if (!row) return 'transparent';
      if (row.inProgress) return INP_GREY;
      return row.clicks >= avgs[d] ? GREEN : RED;
    });
    const borderColor = dows.map(d => {
      const row = byDow[d][positionFromEnd];
      return (row && row.inProgress) ? INP_BORDER : 'transparent';
    });
    datasets.push({
      label: labelTxt,
      data,
      backgroundColor: bg,
      borderColor,
      borderWidth: 1.5,
      _dates: dows.map(d => byDow[d][positionFromEnd]?.label || ''),
      _names: dows.map(d => byDow[d][positionFromEnd]?.name  || ''),
      _inProg: dows.map(d => !!byDow[d][positionFromEnd]?.inProgress),
      _avg:    dows.map(d => avgs[d]),
      borderRadius: 3
    });
  }

  const ctx = _resetCanvas('cnt-raw-weekday-bar');
  if (!ctx) return;
  ctx._chart = _newChart(ctx, {
    type: 'bar',
    data: { labels: dows.map(d => _weekdayLong[d]||d), datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: {
          title: (items) => items.length ? (items[0].chart.data.labels[items[0].dataIndex] || '') : '',
          label: (c) => {
            const ds = c.dataset;
            const date = (ds._dates && ds._dates[c.dataIndex]) || '';
            const name = (ds._names && ds._names[c.dataIndex]) || '';
            const inP  = (ds._inProg && ds._inProg[c.dataIndex]) || false;
            const avg  = (ds._avg   && ds._avg[c.dataIndex])    || 0;
            const val  = (c.parsed && c.parsed.y != null) ? Number(c.parsed.y) : 0;
            const lines = [];
            lines.push(`${name || ds.label}${date ? ' — '+date : ''}`);
            lines.push(`${val.toLocaleString()} total clicks`);
            if (inP) lines.push('(in progress — < 2 days since send)');
            else if (avg > 0) {
              const diff = ((val - avg) / avg * 100);
              const dir = diff >= 0 ? '↑' : '↓';
              lines.push(`Weekday avg: ${Math.round(avg).toLocaleString()} (${dir} ${Math.abs(diff).toFixed(1)}%)`);
            }
            return lines;
          }
        }}
      },
      scales: { y: { beginAtZero: true, ticks: { callback: v => v.toLocaleString() } } }
    }
  });

  const badge = document.getElementById('cnt-raw-weekday-badge');
  if (badge) badge.textContent = `— last ${n} sends per weekday, total clicks per send`;
  const ins = document.getElementById('cnt-raw-weekday-insight');
  if (ins) {
    const legend = `<span style="display:inline-block;width:10px;height:10px;background:${GREEN};border-radius:2px;vertical-align:middle;margin:0 4px 1px 0;"></span>above that weekday's average · `
                 + `<span style="display:inline-block;width:10px;height:10px;background:${RED};border-radius:2px;vertical-align:middle;margin:0 4px 1px 6px;"></span>below average · `
                 + `<span style="display:inline-block;width:10px;height:10px;background:${INP_GREY};border:1px solid ${INP_BORDER};border-radius:2px;vertical-align:middle;margin:0 4px 1px 6px;"></span>in progress (&lt; 2 days since send)`;
    ins.innerHTML = weekdaysWithData < 7
      ? `Showing campaigns for <strong>${weekdaysWithData} of 7</strong> weekdays — only weekdays with at least one send appear. <br>${legend}`
      : `Hover a bar for the campaign name, send date and how it compares to that weekday's average. <br>${legend}`;
  }
}

function _setRawWeeklyWindow(n) {
  if (!_rawClicksData) return;
  window._rawWeeklyN = n;
  ['rww-4','rww-8','rww-12'].forEach(id => {
    const btn = document.getElementById(id);
    if (!btn) return;
    const active = parseInt(id.split('-')[1]) === n;
    btn.style.background = active ? 'var(--accent)' : 'var(--card)';
    btn.style.color = active ? '#fff' : 'var(--text-muted)';
  });
  const series = _sliceSeries(_rawClicksData.raw_clicks_weekly || {}, n);
  const m = _rawMetric(series);
  _clickTrendChart('cnt-raw-weekly-bar', series, m, '#bf3989', 'Click events');
  const badge = document.getElementById('cnt-raw-weekly-badge');
  if (badge) badge.textContent = `— last ${(series.labels||[]).length || 0} ISO weeks`;
  const ins = document.getElementById('cnt-raw-weekly-insight');
  if (ins) {
    const txt = _clickTrendInsight(series, m, 'click events');
    ins.innerHTML = txt
      ? `WoW (last 2 completed weeks): ${txt}. The faded bar is the current (in-progress) week — excluded from the comparison.`
      : `Not enough completed weeks for a WoW comparison yet.`;
  }
}

function _renderRawMonthly() {

  if (badge) badge.textContent = `— last ${(series.labels||[]).length || 0} months`;

/* Split a comma-separated list (e.g. "longevity, health") into trimmed unique values. */
function _crSplit(s) {
  if (!s) return [];
  return String(s).split(',').map(v => v.trim()).filter(Boolean);
}
/* Accessors that tolerate either lambda field name. */

function _crCategory(r) { return r.category || r.categories || ''; }
function _crTags(r)     { return r.tags     || ''; }

  const cats = [...catSet].sort();
  const tags = [...tagSet].sort();
  const authSel = document.getElementById('cr-author');
  authors.forEach(a => { const o=document.createElement('option'); o.value=a; o.textContent=a; authSel.appendChild(o); });
  const catSel = document.getElementById('cr-cat');
  cats.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=c; catSel.appendChild(o); });
  const tagSel = document.getElementById('cr-tag');
  tags.forEach(t => { const o=document.createElement('option'); o.value=t; o.textContent=t; tagSel.appendChild(o); });
  _crFilter();
}

function _crFilter() {
  const posCat = (document.getElementById('cr-poscat').value || '').toLowerCase();
  const pos    = document.getElementById('cr-pos').value;
  const author = document.getElementById('cr-author').value;
  const cat    = document.getElementById('cr-cat').value;
  const tag    = document.getElementById('cr-tag').value;
  const q      = (document.getElementById('cr-search').value||'').toLowerCase();
  let rows = window._crData || [];
  if (posCat) rows = rows.filter(r => _crPosCat(r) === posCat);
  if (pos !== '') {
    if (pos === '0') rows = rows.filter(r => !r.story_position || r.story_position === 0);
    else rows = rows.filter(r => String(r.story_position) === pos);
  }
  if (author) rows = rows.filter(r => _crAuthor(r) === author);
  if (cat)    rows = rows.filter(r => _crSplit(_crCategory(r)).includes(cat));
  if (tag)    rows = rows.filter(r => _crSplit(_crTags(r)).includes(tag));
  if (q)      rows = rows.filter(r => (r.title||'').toLowerCase().includes(q));

  window._crFiltered = rows;
  window._crPage = 1;

  _crRenderKpis(rows);
  _crRenderPosCatChart(rows);
  _crRenderSleepers(rows);
  _crRenderTopBar('cr-cat-bar', 'cr-cat-insight', '_crCatBarChart', rows, _crCategory, 'category');
  _crRenderTopBar('cr-tag-bar', 'cr-tag-insight', '_crTagBarChart', rows, _crTags,     'tag');
  _crRenderPage();

  const filtered = posCat || pos !== '' || author || cat || tag || q;
  const scope = document.getElementById('cr-scope-label');
  if (scope) scope.innerHTML = filtered
    ? `<strong style="color:var(--text);">${rows.length}</strong> articles in scope`
    : `<strong style="color:var(--text);">${rows.length}</strong> articles (all)`;
}

function _crRenderKpis(rows) {
  const n = rows.length;
  const uniq = rows.reduce((a,r) => a + (Number(r.unique_clicks)||0), 0);
  const tot  = rows.reduce((a,r) => a + (Number(r.total_clicks)||0), 0);
  const avg  = n ? (uniq / n) : 0;
  const set = (id, v) => { const el=document.getElementById(id); if (el) el.textContent = v; };
  set('cr-kpi-articles', fmt(n));
  set('cr-kpi-uniq',     fmt(uniq));
  set('cr-kpi-total',    fmt(tot));
  set('cr-kpi-avg',      avg ? avg.toFixed(1) : '—');
}

function _crAggregateBySplit(rows, accessor) {
  // Accumulate unique/total clicks + article count per split label
  // (categories/tags are comma-separated in WordPress).
  const acc = {};
  rows.forEach(r => {
    _crSplit(accessor(r)).forEach(label => {
      if (!acc[label]) acc[label] = { unique: 0, total: 0, count: 0 };
      acc[label].unique += Number(r.unique_clicks) || 0;
      acc[label].total  += Number(r.total_clicks)  || 0;
      acc[label].count  += 1;
    });
  });
  return Object.entries(acc)
    .map(([label, v]) => ({ label, ...v }))
    .sort((a,b) => b.unique - a.unique)
    .slice(0, 10);
}

function _crRenderTopBar(canvasId, insightId, chartKey, rows, accessor, noun) {
  const data = _crAggregateBySplit(rows, accessor);
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  if (window[chartKey]) window[chartKey].destroy();
  window[chartKey] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.label),
      datasets: [
        { label:'Unique Clicks', data: data.map(d => d.unique), backgroundColor:'#1a7f37', borderRadius:4 },
        { label:'Total Clicks',  data: data.map(d => d.total),  backgroundColor:'#0969da', borderRadius:4 },
      ],
    },
    options: { responsive:true, maintainAspectRatio:false, indexAxis:'y',
      plugins:{ legend:{ position:'bottom', labels:{ font:{ size:11 } } },
                tooltip:{ callbacks:{ afterLabel: ctx => `Articles: ${data[ctx.dataIndex].count}` } } },
      scales:{ x:{ beginAtZero:true, ticks:{ callback: v => v.toLocaleString() } } } }
  });
  const ins = document.getElementById(insightId);
  if (ins) {
    if (!data.length) {
      ins.textContent = `No ${noun} in scope.`;
    } else {
      const top = data[0];
      ins.innerHTML = `Top ${noun}: <strong>${esc(top.label)}</strong> — ${fmt(top.unique)} unique / ${fmt(top.total)} total clicks across ${top.count} article${top.count===1?'':'s'}.`;
    }
  }
}

function _crRenderPosCatChart(rows) {
  const order = ['high','medium','low'];
  const byCat = { high:{u:0,t:0,n:0}, medium:{u:0,t:0,n:0}, low:{u:0,t:0,n:0} };
  rows.forEach(r => {
    const k = _crPosCat(r);
    if (!byCat[k]) return;
    byCat[k].u += Number(r.unique_clicks)||0;
    byCat[k].t += Number(r.total_clicks)||0;
    byCat[k].n += 1;
  });
  const labels = order.map(k => k.charAt(0).toUpperCase()+k.slice(1));
  const uniqData  = order.map(k => byCat[k].u);
  const totalData = order.map(k => byCat[k].t);
  const counts    = order.map(k => byCat[k].n);
  if (window._crPosCatChart) window._crPosCatChart.destroy();
  window._crPosCatChart = new Chart(document.getElementById('cr-poscat-bar'), {
    type: 'bar',
    data: { labels, datasets: [
      { label:'Unique Clicks', data:uniqData,  backgroundColor:'#1a7f37', borderRadius:4 },
      { label:'Total Clicks',  data:totalData, backgroundColor:'#0969da', borderRadius:4 }
    ]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{position:'bottom',labels:{font:{size:11}}},
                tooltip:{callbacks:{ afterLabel: ctx => `Articles: ${counts[ctx.dataIndex]}` }} },
      scales:{ y:{ beginAtZero:true } } }
  });
  const ins = document.getElementById('cr-poscat-insight');
  if (ins) {
    const avgU = order.map((k,i) => counts[i] ? (uniqData[i]/counts[i]) : 0);
    ins.innerHTML = order.map((k,i) =>
      `<strong style="color:${_crPosColors[k]}">${labels[i]}</strong>: ${counts[i]} article${counts[i]===1?'':'s'} &middot; avg ${avgU[i].toFixed(1)} unique clicks`
    ).join(' &nbsp;·&nbsp; ');
  }
}

function _crRenderSleepers(rows) {
  const sleepers = rows
    .filter(r => _crPosCat(r) === 'low')
    .slice()
    .sort((a,b) => (Number(b.unique_clicks)||0) - (Number(a.unique_clicks)||0))
    .slice(0, 10);
  const tbody = document.getElementById('cr-sleeper-tbody');
  if (!tbody) return;
  if (!sleepers.length) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:14px;">No low-position articles in scope.</td></tr>`;
    return;
  }
  tbody.innerHTML = sleepers.map((r,i) => {
    const titleCell = r.url
      ? `<a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title||'')}</a>`
      : esc(r.title||'');
    return `<tr>
      <td>${i+1}</td>
      <td>${titleCell}</td>
      <td>${r.story_position || '—'}</td>
      <td>${esc(_crCategory(r))}</td>
      <td>${fmt(r.unique_clicks)}</td>
    </tr>`;
  }).join('');
}

function _crGoto(p) {
  const total = (window._crFiltered||[]).length;
  const maxPage = Math.max(1, Math.ceil(total / CR_PAGE_SIZE));
  window._crPage = Math.min(Math.max(1, p), maxPage);
  _crRenderPage();
}

function _crRenderPage() {
  const rows = window._crFiltered || [];
  const total = rows.length;
  const page = window._crPage || 1;
  const pages = Math.max(1, Math.ceil(total / CR_PAGE_SIZE));
  const start = (page - 1) * CR_PAGE_SIZE;
  const end   = Math.min(start + CR_PAGE_SIZE, total);
  const slice = rows.slice(start, end);

  const countEl = document.getElementById('cr-count');
  if (countEl) countEl.textContent = `Showing ${total ? (start+1) : 0}–${end} of ${total.toLocaleString()} article${total===1?'':'s'}.`;

  const tbody = document.getElementById('cr-tbody');
  if (tbody) {
    tbody.innerHTML = slice.map(r => {
      const posCell = r.story_position ? fmt(r.story_position) : '<span style="color:var(--text-muted);font-style:italic;">No position</span>';
      const pc = _crPosCat(r);
      const pcCell = pc
        ? `<span style="color:${_crPosColors[pc]||'var(--text-muted)'};font-weight:600;text-transform:capitalize;">${pc}</span>`
        : '<span style="color:var(--text-muted);">—</span>';
      const titleCell = r.url
        ? `<a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title||'')}</a>`
        : esc(r.title||'');
      return `<tr>
        <td>${posCell}</td>
        <td>${pcCell}</td>
        <td>${titleCell}</td>
        <td>${esc(_crCategory(r))}</td>
        <td>${esc(_crTags(r))}</td>
        <td>${esc(_crAuthor(r))}</td>
        <td>${fmt(r.unique_clicks)}</td>
        <td>${fmt(r.total_clicks)}</td>
      </tr>`;
    }).join('');
  }

  const pager = document.getElementById('cr-pager');
  if (pager) {
    const btn = (label, p, disabled, active) =>
      `<button class="camp-pager-btn${active?' active':''}" onclick="_crGoto(${p})" ${disabled?'disabled':''}>${label}</button>`;
    const numBtns = [];
    const windowSize = 7;
    let lo = Math.max(1, page - Math.floor(windowSize/2));
    let hi = Math.min(pages, lo + windowSize - 1);
    lo = Math.max(1, hi - windowSize + 1);
    for (let p=lo; p<=hi; p++) numBtns.push(btn(String(p), p, false, p===page));
    pager.innerHTML =
      `<span>Page ${page} of ${pages}</span>
       <div style="display:flex;gap:5px;flex-wrap:wrap;">
         ${btn('« First', 1, page===1)}${btn('‹ Prev', page-1, page===1)}
         ${numBtns.join('')}
         ${btn('Next ›', page+1, page===pages)}${btn('Last »', pages, page===pages)}
       </div>`;
  }
}

function _crReset() {
  ['cr-poscat','cr-pos','cr-author','cr-cat','cr-tag'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  const si = document.getElementById('cr-search'); if (si) si.value = '';
  _crFilter();
}

          const totalRev = parseFloat(M.total_revenue) || 0;
          const share = (totalRev && rev) ? (rev/totalRev*100).toFixed(1)+'%' : '—';
          return `<tr><td>${i+1}</td><td>${esc(s.name||'')}</td><td>${fmt(s.deals)}</td><td>${esc(s.revenue||'—')}</td><td>${avgRev}</td><td>${esc(s.avg_ecpm||'—')}</td><td>${share}</td></tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>
  `;

  // Monthly revenue + deals — bars and line, with future-month differentiation
  const rm = M.revenue_monthly || {labels:[],revenue:[],deals:[]};
  const today = new Date();
  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
  const isFuture = (lbl) => {
    const d = new Date(lbl + ' 1');  // "May 2026" → Date
    return isFinite(d.getTime()) && d > monthStart;
  };
  const revColors = (rm.labels||[]).map(l => isFuture(l) ? 'rgba(207,34,46,0.55)' : '#7d4e00');
  const futureMask = (rm.labels||[]).map(isFuture);
  const firstFutureIdx = futureMask.indexOf(true);
  // For the deals line: split into past (solid) + future (dashed) series so the future segment is visually distinct
  const dealsPast   = (rm.deals||[]).map((v,i) => futureMask[i] ? null : v);
  const dealsFuture = (rm.deals||[]).map((v,i) => futureMask[i] ? v : null);
  // Bridge so the line connects across the boundary
  for (let i=1; i<futureMask.length; i++) {
    if (futureMask[i] && !futureMask[i-1]) dealsFuture[i-1] = rm.deals[i-1];
  }
  // Inline plugin: vertical dashed separator between past/current and future months
  const futureSeparator = {
    id: 'futureSeparator',
    afterDatasetsDraw(chart) {
      if (firstFutureIdx <= 0) return;
      const xScale = chart.scales.x;
      const yArea  = chart.chartArea;
      if (!xScale || !yArea) return;
      const xPrev = xScale.getPixelForValue(firstFutureIdx - 1);
      const xCurr = xScale.getPixelForValue(firstFutureIdx);
      const x = (xPrev + xCurr) / 2;
      const ctx = chart.ctx;
      ctx.save();
      ctx.strokeStyle = '#9a6700';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6,4]);
      ctx.beginPath();
      ctx.moveTo(x, yArea.top);
      ctx.lineTo(x, yArea.bottom);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#9a6700';
      ctx.font = '10px system-ui, sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(' Future →', x + 2, yArea.top + 2);
      ctx.restore();
    }
  };
  new Chart(document.getElementById('rev-monthly'), {
    data: {
      labels: rm.labels||[],
      datasets: [
        { type:'bar', label:'Revenue ($)', data: rm.revenue||[], backgroundColor: revColors, yAxisID:'y' },
        { type:'line', label:'Deals',         data: dealsPast,    borderColor:'#0969da', backgroundColor:'transparent', tension:.25, pointRadius:3, yAxisID:'y1' },
        { type:'line', label:'Deals (future)',data: dealsFuture,  borderColor:'#0969da', backgroundColor:'transparent', borderDash:[5,4], tension:.25, pointRadius:3, pointStyle:'circle', yAxisID:'y1' }
      ]
    },
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'top', labels:{ font:{ size:11 }, filter: it => it.text !== 'Deals (future)' } } },
      scales:{
        y:  { position:'left',  beginAtZero:true, ticks:{ callback:v=>'$'+v.toLocaleString() } },
        y1: { position:'right', beginAtZero:true, grid:{ drawOnChartArea:false }, ticks:{ stepSize:1 } }
      } },
    plugins: [futureSeparator]
  });

  // Sponsor type distribution donut
  const st = M.sponsor_type_dist || {labels:[],data:[],colors:[]};
  new Chart(document.getElementById('rev-stype'), {
    type: 'doughnut',
    data: { labels: st.labels||[], datasets: [{ data: st.data||[], backgroundColor: st.colors || ['#0969da','#1a7f37','#8250df','#9a6700','#cf222e','#1b7c83','#bf3989'], borderWidth: 1 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ font:{ size:11 }, padding:8 } } } }
  });
}

/* ═══════════════════════════════════════
   SUBSCRIBER RETENTION
═══════════════════════════════════════ */
function renderRetention(M) {
  const rt = M.retention_overall || {};
  const sc = M.survival_curve   || {labels:[],rates:[]};
  const findRate = (dayLbl) => {
    const i = (sc.labels||[]).indexOf(dayLbl);
    return i < 0 ? null : (sc.rates||[])[i] != null ? sc.rates[i] : null;
  };
  const pct = v => v == null ? '—' : (Number(v).toFixed(1) + '%');

  document.getElementById('retention').innerHTML = `
    <div class="section-context-banner">
      <strong>Subscriber Retention</strong> — How long subscribers stay engaged after joining, aggregated across all subscribers. Curves show the % still active at 30 / 60 / 90 / 180 / 365 days. "Active" = state = 'Active' AND engagement_segment NOT IN (Ghosts, Zombies, Dormant).
    </div>
    <div class="kpi-row">
      <div class="kpi-card green"><div class="label">30-Day Retention</div><div class="value">${pct(findRate('Day 30'))}</div><div class="sub">Still active at day 30</div></div>
      <div class="kpi-card blue"><div class="label">60-Day Retention</div><div class="value">${pct(findRate('Day 60'))}</div><div class="sub">Still active at day 60</div></div>
      <div class="kpi-card orange"><div class="label">90-Day Retention</div><div class="value">${pct(findRate('Day 90'))}</div><div class="sub">Still active at day 90</div></div>
      <div class="kpi-card cyan"><div class="label">Avg Lifespan</div><div class="value">${rt.avg_lifespan_days != null ? rt.avg_lifespan_days+' d' : '—'}</div><div class="sub">Median: ${rt.median_lifespan_days != null ? rt.median_lifespan_days+' d' : '—'}</div></div>
      <div class="kpi-card purple"><div class="label">Active Rate</div><div class="value">${esc(rt.active_rate||'—')}</div><div class="sub">${fmt(rt.active)} of ${fmt(rt.total)} subscribers</div></div>
    </div>
    <div class="chart-card">
      <h3>Survival Curve <span class="badge-inline">— all subscribers</span></h3>
      <div class="chart-container h340"><canvas id="ret-curve"></canvas></div>
      <div class="insight">30-day: <strong>${pct(findRate('Day 30'))}</strong> &middot; 60-day: <strong>${pct(findRate('Day 60'))}</strong> &middot; 90-day: <strong>${pct(findRate('Day 90'))}</strong>.</div>
    </div>
    <div class="grid-2">
      <div class="chart-card">
        <h3>Lifespan Distribution</h3>
        <div class="chart-container h300"><canvas id="ret-lifespan"></canvas></div>
        <div class="insight">How many subscribers fall into each lifespan bucket.</div>
      </div>
      <div class="chart-card">
        <h3>Monthly Churn Volume</h3>
        <div class="chart-container h300"><canvas id="ret-churn"></canvas></div>
        <div class="insight">Count of subscribers who unsubscribed in each month.</div>
      </div>
    </div>
    <h2 style="font-size:14px;font-weight:600;color:var(--text);margin:22px 0 10px;">Retention by Acquisition Source <span class="badge-inline" style="text-transform:none;">utm_source → source → 'Organic', bucketed</span></h2>
    <div class="chart-card">
      <div class="tbl-wrap"><table class="dash-table">
        <thead><tr>
          <th>Source</th><th>Subscribers</th><th>Active Now</th><th>Churned</th>
          <th>Unsub ≤ 15 d</th><th>Unsub ≤ 30 d</th>
          <th>Avg LTV (days)</th><th>Median LTV</th>
          <th>Clickers</th><th>Clicker Rate</th><th>Unique Clicks</th><th>Clicks / Clicker</th>
        </tr></thead>
        <tbody>${(M.retention_by_source||[]).map(r => {
          const u15 = `${fmt(r.unsub_15d)} <span style="color:var(--text-muted);">(${(r.unsub_15d_rate||0).toFixed(1)}%)</span>`;
          const u30 = `${fmt(r.unsub_30d)} <span style="color:var(--text-muted);">(${(r.unsub_30d_rate||0).toFixed(1)}%)</span>`;
          return `<tr>
            <td><strong>${esc(r.source||'')}</strong></td>
            <td>${fmt(r.subscribers)}</td>
            <td>${fmt(r.active_now)}</td>
            <td>${fmt(r.churned)}</td>
            <td>${u15}</td>
            <td>${u30}</td>
            <td>${r.avg_lifespan_days != null ? r.avg_lifespan_days : '—'}</td>
            <td>${r.median_lifespan_days != null ? r.median_lifespan_days : '—'}</td>
            <td>${fmt(r.clickers)}</td>
            <td>${(r.clicker_rate||0).toFixed(1)}%</td>
            <td>${fmt(r.total_unique_clicks)}</td>
            <td>${r.avg_clicks_per_clicker != null ? Number(r.avg_clicks_per_clicker).toFixed(1) : '—'}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
      <div class="insight"><strong>Active Now</strong> = state = 'Active' AND engagement_segment NOT IN (Ghosts, Zombies, Dormant). Buckets: <strong>AH CPL</strong> (allhealthy/AHCPL1), <strong>Ageist CPL</strong> (theageist), <strong>Share</strong> (referral/share), <strong>Meta</strong> (facebook/fb/ig/if), <strong>Google</strong>, <strong>Direct</strong> (organic / no UTM). LTV is computed only across churned subscribers (avg / median days from join to unsub).</div>
    </div>
  `;

  new Chart(document.getElementById('ret-curve'), {
    type: 'line',
    data: { labels: sc.labels||[], datasets: [
      { label: 'Retention %', data: sc.rates||[], borderColor: '#1a7f37', backgroundColor: 'rgba(26,127,55,.1)', tension:.3, fill:true, pointRadius:4 }
    ]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{ y:{ min:0, max:100, ticks:{ callback: v => v+'%' } } } }
  });

  const ld = M.lifespan_dist || {labels:[],data:[]};
  new Chart(document.getElementById('ret-lifespan'), {
    type: 'bar',
    data: { labels: ld.labels||[], datasets: [
      { label: 'Subscribers', data: ld.data||[], backgroundColor: '#0969da', borderRadius: 4 }
    ]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{ y:{ beginAtZero:true } } }
  });

  const mc = M.monthly_churn || {labels:[],data:[]};
  new Chart(document.getElementById('ret-churn'), {
    type: 'bar',
    data: { labels: mc.labels||[], datasets: [
      { label: 'Churn (unsubscribes)', data: mc.data||[], backgroundColor: '#cf222e', borderRadius: 4 }
    ]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{ y:{ beginAtZero:true } } }
  });
}

/* ═══════════════════════════════════════
   COHORT ANALYSIS
═══════════════════════════════════════ */
function renderCohort(M) {
  const k = M.cohort_kpis || {};
  const heatmap = M.cohort_heatmap || [];
  const tableRows = M.cohort_table || [];
  // Determine which month buckets are populated
  const monthKeys = ['m1','m2','m3','m4','m5','m6','m9','m12'];
  document.getElementById('cohort').innerHTML = `
    <div class="section-context-banner">
      <strong>Cohort Analysis</strong> — Subscribers grouped by their join month. Each cell is the % of that cohort still active N months later. Empty cells = cohort hasn't reached that age yet.
    </div>
    <div class="kpi-row">
      <div class="kpi-card accent"><div class="label">Total Cohorts</div><div class="value">${fmt(k.total_cohorts)}</div><div class="sub">Join-month groups</div></div>
      <div class="kpi-card green"><div class="label">Avg 90-Day Retention</div><div class="value">${esc(k.avg_90d_retention||'—')}</div><div class="sub">Across all cohorts</div></div>
      <div class="kpi-card blue"><div class="label">Best Cohort (M3)</div><div class="value" style="font-size:16px;">${esc(k.best_cohort_label||'—')}</div><div class="sub">${esc(k.best_cohort_m3||'—')} at M3</div></div>
      <div class="kpi-card red"><div class="label">Worst Cohort (M3)</div><div class="value" style="font-size:16px;">${esc(k.worst_cohort_label||'—')}</div><div class="sub">${esc(k.worst_cohort_m3||'—')} at M3</div></div>
    </div>
    <div class="chart-card">
      <h3>Cohort Retention Heatmap</h3>
      <div class="tbl-wrap" id="coh-heatmap-wrap"></div>
      <div class="insight">Each row = a monthly cohort. M1 = % still active 1 month after joining, etc. Colors: dark green ≥ 80% &middot; light green ≥ 60% &middot; amber ≥ 40% &middot; red &lt; 40%.</div>
    </div>
    <div class="chart-card">
      <h3>Cohort Performance Table</h3>
      <div class="tbl-wrap"><table class="dash-table">
        <thead><tr><th>Cohort</th><th>Size</th><th>Active Now</th><th>Churned</th><th>Retention %</th><th>Churn %</th><th>Early Churn (90d)</th><th>Campaigns Sent</th></tr></thead>
        <tbody>${tableRows.map(r => `<tr>
          <td>${esc(r.cohort||'')}</td>
          <td>${fmt(r.size)}</td>
          <td>${fmt(r.active_now)}</td>
          <td>${fmt(r.churned)}</td>
          <td>${esc(r.retention_pct||'—')}</td>
          <td>${esc(r.churn_rate_pct||'—')}</td>
          <td>${esc(r.early_churn_pct||'—')}</td>
          <td>${fmt(r.campaigns_sent)}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>
  `;

  // Build heatmap
  const heatColor = v => {
    if (v == null) return 'background:var(--card-2);color:var(--text-dim);';
    if (v >= 80) return 'background:#1a7f37;color:#fff;';
    if (v >= 60) return 'background:#2da44e;color:#fff;';
    if (v >= 40) return 'background:#9a6700;color:#fff;';
    if (v >= 20) return 'background:#d29922;color:#000;';
    return 'background:#cf222e;color:#fff;';
  };
  let html = '<table class="dash-table"><thead><tr><th class="cohort-th-sticky">Cohort</th><th>Size</th>';
  monthKeys.forEach(mk => html += `<th>M${mk.slice(1)}</th>`);
  html += '</tr></thead><tbody>';
  heatmap.forEach(row => {
    html += `<tr><td class="cohort-td-sticky">${esc(row.cohort||'')}</td><td>${fmt(row.size)}</td>`;
    monthKeys.forEach(mk => {
      const v = row[mk];
      if (v == null) html += `<td class="cohort-cell-null">—</td>`;
      else html += `<td style="${heatColor(v)}">${v.toFixed(1)}%</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  const wrap = document.getElementById('coh-heatmap-wrap');
  if (wrap) wrap.innerHTML = html;
}
</script>
</body>
</html>

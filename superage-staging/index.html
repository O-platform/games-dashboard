<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperAge — Brand Pulse Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f6f8fa;
    --card: #ffffff;
    --card-2: #f0f2f5;
    --card-border: #d0d7de;
    --text: #1f2328;
    --text-muted: #57606a;
    --text-dim: #8c959f;
    --accent: #0969da;
    --green: #1a7f37;
    --red: #cf222e;
    --orange: #9a6700;
    --purple: #8250df;
    --pink: #bf3989;
    --cyan: #1b7c83;
    --gold: #7d4e00;
    --blue: #0969da;
    --header-bg: linear-gradient(160deg, #dce8f5 0%, #f6f8fa 60%);
    --row-hover: #f0f2f5;
    --row-border: #e8eaed;
  }
  body.dark {
    --bg: #0d1117;
    --card: #161b22;
    --card-2: #1c2128;
    --card-border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --orange: #d29922;
    --purple: #bc8cff;
    --pink: #f778ba;
    --cyan: #39c5cf;
    --gold: #e3b341;
    --blue: #58a6ff;
    --header-bg: linear-gradient(160deg, #0d1b2e 0%, #0d1117 60%);
    --row-hover: #1c2128;
    --row-border: #30363d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  /* Header */
  .header { background: var(--header-bg); border-bottom: 1px solid var(--card-border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .sa-logo {
    flex-shrink: 0;
    width: 40px; height: 40px;
    background: transparent;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,.2);
    padding: 5px;
  }
  .sa-logo img, .sa-logo svg { width: 100%; height: 100%; }
  /* Dark mode: invert the dark-variant logo to white; hide the light-mode logo */
  body.dark  .sa-logo .logo-dark  { filter: brightness(0) invert(1); }
  body.dark  .sa-logo .logo-light { display: none; }
  /* Light mode: show the light logo (black), hide the dark-variant logo */
  body:not(.dark) .sa-logo .logo-dark  { display: none; }
  body:not(.dark) .sa-logo .logo-light { display: block; }
  .header h1 { font-size: 19px; font-weight: 700; color: var(--text); }
  .header .sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 18px; }
  .header-meta { display: flex; flex-direction: column; gap: 2px; align-items: flex-end; }
  .header-top { display: flex; align-items: center; gap: 10px; }
  .header-date { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; }
  .header-sub-line { font-size: 11px; color: var(--text-muted); }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; line-height: 1.3; }
  .pill-blue { background: rgba(9,105,218,.12); color: var(--accent); border: 1px solid rgba(9,105,218,.30); }
  body.dark .pill-blue { background: rgba(88,166,255,.15); color: #58a6ff; border-color: rgba(88,166,255,.35); }
  .dark-switch { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .dark-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
  .dark-slider { position: relative; width: 42px; height: 22px; background: var(--card-border); border-radius: 22px; transition: background .2s; flex-shrink: 0; }
  .dark-slider:before { content: ""; position: absolute; height: 16px; width: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform .2s; box-shadow: 0 1px 2px rgba(0,0,0,.25); }
  .dark-switch input:checked + .dark-slider { background: var(--accent); }
  .dark-switch input:checked + .dark-slider:before { transform: translateX(20px); }
  .dark-label { font-size: 11px; font-weight: 700; letter-spacing: .5px; color: var(--text-muted); }
  body.dark .dark-label { color: var(--text); }
  /* Tabs */
  .tab-bar { background: var(--card); border-bottom: 1px solid var(--card-border); display: flex; overflow-x: auto; padding: 0 16px; gap: 0; }
  .tab { background: none; border: none; border-bottom: 2px solid transparent; padding: 10px 16px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: color .15s, border-color .15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  /* Pages */
  .page { display: none; padding: 20px 24px; max-width: 1280px; margin: 0 auto; }
  .page.active { display: block; }
  /* Cards */
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px,1fr)); gap: 12px; margin-bottom: 18px; }
  .kpi-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 10px; padding: 14px 16px; }
  .kpi-card .label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .kpi-card .value { font-size: 24px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .kpi-card .sub { font-size: 11px; color: var(--text-muted); }
  .kpi-card.accent .value { color: var(--accent); }
  .kpi-card.green .value { color: var(--green); }
  .kpi-card.red .value { color: var(--red); }
  .kpi-card.orange .value { color: var(--orange); }
  .kpi-card.purple .value { color: var(--purple); }
  .kpi-card.pink .value { color: var(--pink); }
  .kpi-card.cyan .value { color: var(--cyan); }
  .kpi-card.gold .value { color: var(--gold); }
  .kpi-card.blue .value { color: var(--blue); }
  /* Charts */
  .chart-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 10px; padding: 18px 20px; margin-bottom: 18px; }
  .chart-card h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
  .chart-container { position: relative; }
  /* Anchor the canvas to the chart-container so Chart.js (with responsive:true,
     maintainAspectRatio:false) can never shrink below the container's height —
     fixes the "chart becomes half size after toggling a filter" symptom. */
  .chart-container > canvas { position: absolute; inset: 0; width: 100% !important; height: 100% !important; }
  .chart-container.h220 { height: 220px; }
  .chart-container.h240 { height: 240px; }
  .chart-container.h260 { height: 260px; }
  .chart-container.h300 { height: 300px; }
  .chart-container.h340 { height: 340px; }
  .chart-container.h380 { height: 380px; }
  .chart-container.h420 { height: 420px; }
  /* Grid layouts */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; margin-bottom: 18px; }
  @media (max-width: 860px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
  /* Tables */
  .tbl-wrap { overflow-x: auto; }
  table.dash-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.dash-table th { background: var(--card-2); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; color: var(--text-muted); padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--card-border); white-space: nowrap; }
  table.dash-table td { padding: 7px 10px; border-bottom: 1px solid var(--row-border); vertical-align: top; }
  table.dash-table td.nowrap, table.dash-table th.nowrap { white-space: nowrap; }
  table.dash-table tr:hover td { background: var(--row-hover); }
  /* Misc */
  .badge-inline { font-size: 11px; font-weight: 500; color: var(--text-muted); }
  .insight { font-size: 12px; color: var(--text-muted); margin-top: 10px; line-height: 1.5; }
  .section-context-banner { background: var(--card-2); border: 1px solid var(--card-border); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }
  .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 12px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--card-border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Article table */
  .art-row-expand { cursor: pointer; }
  .art-detail-row { display: none; }
  .art-detail-row.open { display: table-row; }
  .art-detail-cell { padding: 8px 10px 12px 30px !important; background: var(--card-2); font-size: 12px; color: var(--text-muted); }
  /* Filter row */
  .filter-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 12px; }
  .filter-row label { font-size: 12px; color: var(--text-muted); }
  .filter-row select, .filter-row input[type=text] { font-size: 12px; padding: 4px 8px; border: 1px solid var(--card-border); border-radius: 6px; background: var(--card); color: var(--text); }
  /* Campaign toolbar */
  .camp-toolbar { display:flex; align-items:center; justify-content:space-between; gap:14px; padding:12px 16px; background: var(--card); border:1px solid var(--card-border); border-radius:10px; margin-bottom:16px; }
  .camp-toolbar-left { display:flex; align-items:center; gap:12px; }
  /* iOS-style toggle */
  .switch { position: relative; display: inline-block; width: 38px; height: 22px; flex-shrink:0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider-round { position: absolute; cursor: pointer; inset: 0; background: var(--card-border); transition: .2s; border-radius: 22px; }
  .slider-round:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; top: 3px; background: #fff; transition: .2s; border-radius: 50%; box-shadow: 0 1px 2px rgba(0,0,0,.2); }
  .switch input:checked + .slider-round { background: var(--accent); }
  .switch input:checked + .slider-round:before { transform: translateX(16px); }
  /* Pager */
  .camp-pager-btn { padding:4px 9px; border-radius:5px; border:1px solid var(--card-border); background:var(--card); color:var(--text-muted); cursor:pointer; font-size:12px; transition: background .15s, color .15s; }
  .camp-pager-btn:hover:not([disabled]) { background: var(--card-2); color: var(--text); }
  .camp-pager-btn[disabled] { opacity:.4; cursor:not-allowed; }
  .camp-pager-btn.active { background: var(--accent); color:#fff; border-color: var(--accent); }
  /* Cohort */
  .cohort-cell-null { background: var(--card-2) !important; color: var(--text-dim) !important; }
  .cohort-th-sticky { position: sticky; left: 0; background: var(--card); z-index: 2; }
  .cohort-td-sticky { position: sticky; left: 0; background: var(--card); z-index: 1; white-space: nowrap; }
  .coh-nav { display: flex; gap: 6px; align-items: center; }
  .coh-nav button { font-size: 12px; padding: 3px 10px; border: 1px solid var(--card-border); border-radius: 5px; background: var(--card); color: var(--text-muted); cursor: pointer; }
  .coh-nav button:hover { background: var(--card-2); }
  /* Comparison table */
  .cmp-win { color: var(--green); font-weight: 600; }
  .cmp-lose { color: var(--red); }
  .cmp-neutral { color: var(--text-muted); }
  /* Tooltip override */
  canvas { max-width: 100%; }
</style>
</head>
<body>
<div id="loading-overlay" class="loading-overlay">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--text-muted);">Loading dashboard data…</div>
</div>
<div id="dashboard-content" style="display:none;">

<header class="header">
  <div class="header-left">
    <div class="sa-logo">
      <img src="./svg-sa.svg"       alt="SuperAge" class="logo-dark">
      <img src="./svg-sa-light.svg" alt="SuperAge" class="logo-light">
    </div>
    <div>
      <h1>SuperAge — Brand Pulse</h1>
      <div class="sub">Campaign &amp; Audience Intelligence</div>
    </div>
  </div>
  <div class="header-right">
    <div class="header-meta">
      <div class="header-top">
        <span class="pill pill-blue">Daily updates</span>
        <span class="header-date" id="as-of-label">—</span>
      </div>
      <div class="header-sub-line">SuperAge — Brand Pulse · Last updated</div>
    </div>
    <label class="dark-switch" title="Toggle dark mode">
      <input type="checkbox" id="darkToggleInput">
      <span class="dark-slider"></span>
      <span class="dark-label">DARK</span>
    </label>
  </div>
</header>

<nav class="tab-bar" id="tab-bar">
  <button class="tab active" onclick="showPage('overview',this)">Overview</button>
  <button class="tab" onclick="showPage('digest',this)">Weekly Digest</button>
  <button class="tab" onclick="showPage('campaigns',this)">Campaigns</button>
  <button class="tab" onclick="showPage('content',this)">Click Analysis</button>
  <button class="tab" onclick="showPage('content-ref',this)">Content Reference</button>
  <button class="tab" onclick="showPage('audience',this)">Audience</button>
  <button class="tab" onclick="showPage('quiz',this)">Audience Persona</button>
  <button class="tab" onclick="showPage('revenue',this)">Revenue &amp; Sponsors</button>
  <button class="tab" onclick="showPage('retention',this)">Subscriber Retention</button>
  <button class="tab" onclick="showPage('cohort',this)">Cohort Analysis</button>
</nav>

<div id="overview" class="page active"></div>
<div id="digest" class="page"></div>
<div id="campaigns" class="page"></div>
<div id="content" class="page"></div>
<div id="content-ref" class="page"></div>
<div id="audience" class="page"></div>
<div id="quiz" class="page"></div>
<div id="revenue" class="page"></div>
<div id="retention" class="page"></div>
<div id="cohort" class="page"></div>

</div>

<script>
/* ═══════════════════════════════════════
   DARK MODE
═══════════════════════════════════════ */
const _dk = localStorage.getItem('sa-dark') === '1';
if (_dk) document.body.classList.add('dark');
function setDark(on) {
  document.body.classList.toggle('dark', on);
  localStorage.setItem('sa-dark', on ? '1' : '0');
}
{
  const inp = document.getElementById('darkToggleInput');
  if (inp) {
    inp.checked = _dk;
    inp.addEventListener('change', e => setDark(e.target.checked));
  }
}

/* ═══════════════════════════════════════
   TABS
═══════════════════════════════════════ */
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (btn) btn.classList.add('active');
}

/* ═══════════════════════════════════════
   UTILITIES
═══════════════════════════════════════ */
function fmt(n) {
  if (n === null || n === undefined) return '—';
  return Number(n).toLocaleString();
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function utmLabel(raw) {
  // Canonicalises a raw utm_source / source value to a display label.
  // **Mirror of `_canon_source()` in superage_metrics_lambda_updated.py.**
  // KEEP BOTH LISTS IN SYNC — the SQL applies this same mapping before
  // GROUP BY so aliases collapse into a single row in the JSON; this JS
  // function is the fallback for any raw values that still slip through.
  if (!raw) return '—';
  const s = String(raw).trim().toLowerCase();
  // True placeholder strings — no data, surface as '—'
  if (['none', 'null', '(none)', '(null)', 'n/a', '-', ''].includes(s)) return '—';
  // Organic: null-equivalent intent or direct traffic
  if (['organic', 'direct'].includes(s)) return 'Organic';
  // Website: subscribers who joined via a web property
  if (['website', 'homepage', 'home', 'web', 'site', 'games_website'].includes(s)) return 'Website';
  // AllHealthy
  if (['ahcpl1', 'allhealthy', 'allhealthy.com'].includes(s)) return 'AllHealthy';
  // TDCPL: TDCPL1, TDCPL2, and every TD_CPL2_YYYYMMDD batch
  if (s === 'tdcpl1' || s === 'tdcpl2' || s.startsWith('td_cpl2')) return 'TDCPL';
  // LSCPL: CPL1, CPL2 and the .com variant
  if (['lscpl1','lscpl2','ls_cpl2','livingsimply','livingsimply.com'].includes(s)) return 'LSCPL';
  // dpcpl / hfcpl / fccpl — real name unknown, surface the raw code as-is
  // Meta: facebook + instagram only (IF / IFCPL1 split out below)
  if (['facebook','meta','fb','ig'].includes(s)) return 'Meta';
  // IFCPL: IF short code + IFCPL1 batch (its own brand, not Meta)
  if (['if','ifcpl1'].includes(s)) return 'IFCPL';
  // Taboola
  if (s === 'taboola') return 'Taboola';
  // HealthBrief / SuperAge Quiz
  if (s === 'healthbrief') return 'HealthBrief';
  if (s === 'superagequiz' || s === 'longevity_quiz') return 'SuperAge Quiz';
  // TheAgeist
  if (['theageist','theageist001','ageist'].includes(s)) return 'TheAgeist';
  if (s.startsWith('ageist_') || s.startsWith('ageistrequest')) return 'TheAgeist';
  // RRCPL
  if (['recommendedreads.com','rr_cpl2'].includes(s)) return 'RRCPL';
  if (s.startsWith('rrcpl1')) return 'RRCPL';
  // Campaign Monitor / Welcome Flow (case + URL-encoded collapse)
  if (s === 'campaign_monitor') return 'Campaign Monitor';
  if (['welcome flow','welcome+flow'].includes(s)) return 'Welcome Flow';
  // NNCPL family
  if (s === 'nncpl1' || s.startsWith('nn_cpl2') || s.startsWith('nn1_cpl2')) return 'NNCPL';
  // ISCPL family
  if (['is','iscpl1'].includes(s)) return 'ISCPL';
  // AI referrers
  if (['chatgpt.com','perplexity','nbot.ai'].includes(s)) return 'AI';
  // Refind / SuperAge (own labels — SuperAge is distinct from SuperAge Quiz)
  if (s === 'refind') return 'Refind';
  if (s === 'superage') return 'SuperAge';
  return raw;
}

/* ═══════════════════════════════════════
   DATA LOAD
   ───────────────────────────────────────
   JSON is served from a Cloudflare Worker fronting an R2 bucket. The
   `superage-dashboard/*.json` keys are written by the two refresh
   Lambdas (see superage_metrics_lambda_updated.py + superage_comparison_lambda.py).
═══════════════════════════════════════ */
const DASHBOARD_API = 'https://dashboard.pardon-ventures-06b.workers.dev';
Promise.all([
  fetch(`${DASHBOARD_API}/superage-dashboard/superage-metrics.json`).then(r => r.json()),
  fetch(`${DASHBOARD_API}/superage-dashboard/superage-comparison.json`).then(r => r.ok ? r.json() : {}).catch(() => ({}))
])
  .then(([metrics, comparison]) => {
    const M = Object.assign({}, metrics, comparison);
    const asOf = M.data_as_of || '—';
    document.getElementById('as-of-label').textContent = asOf;
    renderOverview(M);
    renderDigest(M);
    renderCampaigns(M);
    renderContent(M);
    renderContentRef(M);
    renderAudience(M);
    renderQuiz(M);
    renderRevenue(M);
    renderRetention(M);
    renderCohort(M);
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('dashboard-content').style.display = 'block';
  })
  .catch(err => {
    document.getElementById('loading-overlay').innerHTML =
      '<div style="color:var(--red);font-size:16px;">Failed to load dashboard data</div>' +
      '<div style="color:var(--text-muted);font-size:12px;margin-top:8px;">' + esc(String(err.message||err)) + '</div>';
  });

/* ═══════════════════════════════════════
   OVERVIEW
═══════════════════════════════════════ */
function renderOverview(M) {
  document.getElementById('overview').innerHTML = `
    <div class="section-context-banner">
      <strong>Executive Overview</strong> — Top-line health of the SuperAge newsletter: subscriber base, campaign performance, content engagement, and revenue at a glance.
      Data refreshes daily. All figures exclude today and future-dated records.
    </div>


    <div class="kpi-row" style="grid-template-columns:repeat(4,1fr);">
      <div class="kpi-card green"><div class="label">Active (Send-to)</div><div class="value">${fmt(M.send_to_active)}</div><div class="sub">&nbsp;</div></div>
      <div class="kpi-card cyan"><div class="label">Avg Open Rate</div><div class="value">${M.avg_open_rate}</div><div class="sub">&nbsp;</div></div>
      <div class="kpi-card blue"><div class="label">Avg Click Rate</div><div class="value">${M.avg_click_rate}</div><div class="sub">&nbsp;</div></div>
      <div class="kpi-card orange"><div class="label">Campaigns Sent</div><div class="value">${fmt(M.total_campaigns)}</div><div class="sub">${fmt(M.total_recipients)} total recipients</div></div>
    </div>

    <div class="kpi-row" style="grid-template-columns:repeat(4,1fr);">
      <div class="kpi-card accent"><div class="label">Total Subscribers</div><div class="value">${fmt(M.total_subscribers)}</div><div class="sub">All-time subscriber base</div></div>
      <div class="kpi-card red"><div class="label">Unsubscribed</div><div class="value">${fmt(M.unsubscribed_count)}</div><div class="sub">${M.total_subscribers ? (M.unsubscribed_count/M.total_subscribers*100).toFixed(1)+'%' : '—'} of total</div></div>
      <div class="kpi-card orange"><div class="label">Bounced</div><div class="value">${fmt(M.bounced_count)}</div><div class="sub">${M.total_subscribers ? (M.bounced_count/M.total_subscribers*100).toFixed(1)+'%' : '—'} of total</div></div>
      <div class="kpi-card purple"><div class="label">Quiz Takers</div><div class="value">${fmt(M.quiz_takers)}</div><div class="sub">${M.quiz_takers_pct}% of total subscribers</div></div>
    </div>

    <div class="chart-card">
      <h3>Current Subscriber Mix <span class="badge-inline">— state='Active', split by engagement segment</span></h3>
      <div class="chart-container h260"><canvas id="ov-state-donut"></canvas></div>
      <div id="ov-state-pct-table" style="margin-top:8px;font-size:12px;"></div>
      <div class="insight">

      <p style="font-size:12px;color:var(--text-muted);margin:0 0 10px;">Green bars (gained) sit above zero; red bars (lost) sit below zero. The blue <strong>Net Gain / Loss</strong> filled area crosses through — a positive bucket sits above the zero gridline, a negative bucket dips below. Purple dashed line on the right axis is the running Total Subscribers (latest snapshot per bucket — Send-To base).</p>

    <div class="chart-card">
      <h3>Recent Campaigns Metrics</h3>
      <div class="tbl-wrap"><table class="dash-table"><thead><tr><th>#</th><th>Campaign</th><th>Sent</th><th>Recipients</th><th>Open Rate</th><th>Click Rate</th></tr></thead>
      <tbody>${([...(M.campaign_table||[])].sort((a,b)=>{const da=Date.parse(a.sent_date||'')||0;const db=Date.parse(b.sent_date||'')||0;return db-da;}).slice(0,10)).map((c,i)=>{
        const nameCell = c.url ? `<a href="${esc(c.url)}" target="_blank" rel="noopener">${esc(c.name||'')}</a>` : esc(c.name||'');
        const recip = (c.recipients == null) ? '—' : (typeof c.recipients === 'string' ? esc(c.recipients) : fmt(c.recipients));

  const ss = M.subscriber_engagement_mix || M.subscriber_states || {labels:[], data:[], colors:[]};
  const donutColors = ss.colors && ss.colors.length ? ss.colors : ['#1a7f37','#9a6700','#cf222e','#58a6ff','#8250df','#bf3989','#1b7c83'];
  new Chart(document.getElementById('ov-state-donut'), {
    type: 'doughnut',
    data: { labels: ss.labels, datasets: [{ data: ss.data, backgroundColor: donutColors, borderWidth: 1 }] },

  });
  // % legend strip below the donut
  const pctTbl = document.getElementById('ov-state-pct-table');
  if (pctTbl && ss.labels && ss.labels.length) {
    const total = ss.data.reduce((a,b)=>a+b,0);
    const rows = ss.labels.map((lbl,i)=>{
      const cnt = ss.data[i]||0;
      const pct = total ? (cnt/total*100).toFixed(1) : '0.0';
      return `<span style="display:inline-block;margin-right:14px;"><span style="color:${donutColors[i]||'var(--text-muted)'};font-weight:600;">${esc(lbl)}</span> ${pct}% (${fmt(cnt)})</span>`;
    }).join('');
    pctTbl.innerHTML = rows;
  }
  // Campaign Performance Trend — built client-side from M.campaign_table
  // so the Sunday Spotlight include/exclude toggle can re-filter without a
  // lambda re-run. Two side-by-side charts (Open Rate / Click Rate), each
  // a single-line series with **send date** on the x-axis so one bar = one
  // campaign in chronological order.
  window._ovCampData = M.campaign_table || [];
  window._ovCampWindow = '90d';   // default — matches the highlighted button
  _renderOvCampTrend();
  // Growth chart — sourced from M.subscriber_growth_series (multi-granularity:
  // daily / weekly / monthly buckets) with M.subscriber_monthly as the
  // backwards-compat fallback. Default granularity = monthly, default
  // window = 12 buckets. Picker buttons + window buttons re-render the
  // chart by re-slicing the cached payload — no lambda re-fetch.
  const series = M.subscriber_growth_series || null;
  const monthlyFallback = M.subscriber_monthly || {labels:[],new_subs:[],unsubs:[],active_count:[]};
  window._ovGrowthSeries = series || { monthly: monthlyFallback, weekly: null, daily: null };
  window._ovGrowthGran   = 'monthly';
  window._ovGrowthWin    = 6;
  _renderOvGrowthWinButtons();
  _renderOvGrowth();
}

/* Defines the window-button presets for each granularity. The number is
 * "how many buckets" — for daily that's days, weekly is weeks, monthly is
 * months. Default window per granularity is the third entry. Monthly only
 * goes up to 6m because the growth_history rollup typically has at most
 * 6 months of data on hand. */
const _OV_GROWTH_WIN_PRESETS = {
  daily:   [{key:'all',label:'All'}, {key:90,label:'90d'}, {key:30,label:'30d'}, {key:14,label:'14d'}, {key:7,label:'7d'}],
  weekly:  [{key:'all',label:'All'}, {key:26,label:'26w'}, {key:12,label:'12w'}, {key:8, label:'8w'},  {key:4, label:'4w'}],
  monthly: [{key:'all',label:'All'}, {key:6, label:'6m'}, {key:3, label:'3m'}],
};
const _OV_GROWTH_DEFAULT_WIN = { daily: 30, weekly: 12, monthly: 6 };

/* Switch granularity. Re-renders the window-button row to match the new
 * unit (days / weeks / months) and snaps the window to that granularity's
 * default before re-drawing the chart. */
function _setOvGrowthGran(gran) {
  window._ovGrowthGran = gran;
  ['daily','weekly','monthly'].forEach(g => {
    const btn = document.getElementById('ovgg-' + g);
    if (!btn) return;
    const active = g === gran;
    btn.style.background = active ? 'var(--accent)' : 'var(--card)';
    btn.style.color      = active ? '#fff'          : 'var(--text-muted)';
  });
  window._ovGrowthWin = _OV_GROWTH_DEFAULT_WIN[gran];
  _renderOvGrowthWinButtons();
  _renderOvGrowth();
}

/* Builds the window-button row dynamically based on the active granularity.
 * Highlighted button = current window. Each button calls
 * _setOvGrowthWindow(key) which restyles + re-renders. */
function _renderOvGrowthWinButtons() {
  const container = document.getElementById('ov-growth-win-btns');
  if (!container) return;
  const presets = _OV_GROWTH_WIN_PRESETS[window._ovGrowthGran] || _OV_GROWTH_WIN_PRESETS.monthly;
  container.innerHTML = presets.map(p => {
    const active = p.key === window._ovGrowthWin;
    return `<button onclick="_setOvGrowthWindow(${JSON.stringify(p.key)})"
                    style="font-size:11px;padding:3px 10px;border:1px solid var(--card-border);border-radius:5px;background:${active ? 'var(--accent)' : 'var(--card)'};color:${active ? '#fff' : 'var(--text-muted)'};cursor:pointer;">${p.label}</button>`;
  }).join('');
}

function _setOvGrowthWindow(win) {
  window._ovGrowthWin = win;
  _renderOvGrowthWinButtons();
  _renderOvGrowth();
}

/* Pulls the dataset for the active granularity from the cached series,
 * resolves the window slice size (or Infinity for All), and hands off to
 * _ovGrowthChart for the actual Chart.js render. */
function _renderOvGrowth() {
  const series = window._ovGrowthSeries || {};
  const gd = series[window._ovGrowthGran] || series.monthly || {labels:[],new_subs:[],unsubs:[],active_count:[]};
  const n  = window._ovGrowthWin === 'all' ? Infinity : Number(window._ovGrowthWin);
  _ovGrowthChart(gd, n);
}
/* Overview Campaign Performance Trend — pulls from window._ovCampData
 * (= M.campaign_table) and renders two single-metric line charts:
 *   • Open Rate over time
 *   • Click Rate over time
 * X-axis is the campaign's send date (one point per qualifying campaign),
 * sorted chronologically. The Sunday Spotlight toggle above the charts
 * filters out branded-digest sends so their atypical rates don't spike
 * the trend (off by default — toggle ON to include them). Tooltip shows
 * the campaign name + the rate; the URL opens in a new tab on point click. */
function _setOvCampWindow(win) {
  window._ovCampWindow = win;
  // Toggle active button styling
  ['all', '180', '90', '60', '30'].forEach(suffix => {
    const btn = document.getElementById('ovcw-' + suffix);
    if (!btn) return;
    const wantKey = suffix === 'all' ? 'all' : (suffix + 'd');
    const active = wantKey === win;
    btn.style.background = active ? 'var(--accent)' : 'var(--card)';
    btn.style.color      = active ? '#fff'          : 'var(--text-muted)';
  });
  _renderOvCampTrend();
}

function _renderOvCampTrend() {
  const includeSS = (document.getElementById('ovCampIncludeSS') || {}).checked;
  const stateEl = document.getElementById('ovCampSSState');
  if (stateEl) stateEl.textContent = includeSS ? 'Included' : 'Excluded';

  // Resolve the active date window (defaults to 90 days on first render).
  const win = window._ovCampWindow || '90d';
  const days = win === 'all' ? null : parseInt(win, 10);
  const cutoff = days ? (Date.now() - days * 86400000) : null;

  // Filter + sort by send date ASC. Skip rows without a parseable date.
  // Date-window filter is applied here too — keep only campaigns whose
  // sent_date falls within the last N days (or all if "all" is selected).
  const rows = (window._ovCampData || [])
    .filter(c => includeSS ? true : !_isSundayCampaign(c))
    .filter(c => c.sent_date && !isNaN(Date.parse(c.sent_date)))
    .filter(c => cutoff == null || new Date(c.sent_date).getTime() >= cutoff)
    .sort((a, b) => new Date(a.sent_date) - new Date(b.sent_date));

  const labels   = rows.map(c => String(c.sent_date).slice(0, 10));
  const names    = rows.map(c => c.name || '');
  const opens    = rows.map(c => _campPct(c.open_rate));
  const clicks   = rows.map(c => _campPct(c.click_rate));
  const urls     = rows.map(c => c.url || '');

  const insightEl = document.getElementById('ov-camp-insight');
  if (insightEl) {
    const winLabel = win === 'all' ? 'all time' : `last ${days} days`;
    insightEl.innerHTML = rows.length
      ? `${rows.length} campaign${rows.length === 1 ? '' : 's'} in scope (${esc(winLabel)}) — Sunday Spotlight ${includeSS ? '<strong>included</strong>' : '<strong>excluded</strong>'}.`
      : `No campaigns in the ${esc(winLabel)} window — widen the date filter or toggle Sunday Spotlight on.`;
  }

  const mkOpts = (titleText) => ({
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          title: items => names[items[0].dataIndex] || labels[items[0].dataIndex],
          label: c => `${titleText}: ${c.parsed.y == null ? '—' : Number(c.parsed.y).toFixed(2) + '%'}`,
          afterLabel: c => `Sent: ${labels[c.dataIndex]}`
        }
      }
    },
    onClick: (_e, els) => {
      if (!els || !els.length) return;
      const u = urls[els[0].index];
      if (u) window.open(u, '_blank', 'noopener');
    },
    scales: {
      x: { ticks: { font: { size: 10 }, maxRotation: 60, minRotation: 0, autoSkip: true, maxTicksLimit: 14 } },
      y: { beginAtZero: true, ticks: { callback: v => Number(v).toFixed(0) + '%' } }
    }
  });

  // Destroy any prior chart instances before re-rendering (toggle flips
  // produce a fresh dataset each time).
  if (window._ovOpenChart)  { window._ovOpenChart.destroy();  window._ovOpenChart  = null; }
  if (window._ovClickChart) { window._ovClickChart.destroy(); window._ovClickChart = null; }

  const openEl  = document.getElementById('ov-camp-open');
  const clickEl = document.getElementById('ov-camp-click');
  if (openEl) {
    window._ovOpenChart = new Chart(openEl, {
      type: 'line',
      data: { labels, datasets: [{ label: 'Open Rate %', data: opens,
        borderColor: '#0969da', backgroundColor: 'rgba(9,105,218,.10)',
        tension: 0.3, pointRadius: 3, borderWidth: 2, fill: true, spanGaps: true }] },
      options: mkOpts('Open Rate')
    });
  }
  if (clickEl) {
    window._ovClickChart = new Chart(clickEl, {
      type: 'line',
      data: { labels, datasets: [{ label: 'Click Rate %', data: clicks,
        borderColor: '#1a7f37', backgroundColor: 'rgba(26,127,55,.10)',
        tension: 0.3, pointRadius: 3, borderWidth: 2, fill: true, spanGaps: true }] },
      options: mkOpts('Click Rate')
    });
  }
}

function _ovGrowthChart(gd, n) {
  // n can be Infinity (when the user picks "All"); slice() copes with that.
  const labels = (gd.labels||[]).slice(-n);
  const newS   = (gd.new_subs||[]).slice(-n);
  const unsub  = (gd.unsubs||[]).slice(-n);
  const active = (gd.active_count||[]).slice(-n);
  // MRR-style layout: gained sits above zero (positive), lost sits below
  // zero (negative), and the Net Gain/Loss series crosses through with a
  // filled area so it reads at-a-glance even when the bars dominate.
  const unsubNeg = unsub.map(v => -Math.abs(Number(v) || 0));
  const net      = newS.map((v, i) => (Number(v) || 0) - Math.abs(Number(unsub[i]) || 0));

  const ctx = document.getElementById('ov-growth');
  if (!ctx) return;
  if (ctx._chart) ctx._chart.destroy();
  ctx._chart = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [
      { label: 'Gained (new)',     data: newS,     backgroundColor: 'rgba(26,127,55,.85)',
        borderColor: '#1a7f37', borderWidth: 1, yAxisID: 'y',
        stack: 'flow', borderRadius: 3,
        categoryPercentage: 0.6, barPercentage: 0.85 },
      { label: 'Lost (unsubs)',    data: unsubNeg, backgroundColor: 'rgba(207,34,46,.85)',
        borderColor: '#cf222e', borderWidth: 1, yAxisID: 'y',
        stack: 'flow', borderRadius: 3,
        categoryPercentage: 0.6, barPercentage: 0.85 },
      { label: 'Net Gain / Loss',  data: net, type: 'line',
        borderColor: '#0969da', backgroundColor: 'rgba(9,105,218,.15)',
        tension: .35, pointRadius: 4, pointBackgroundColor: '#0969da',
        borderWidth: 3, yAxisID: 'y',
        fill: { target: 'origin', above: 'rgba(9,105,218,.12)', below: 'rgba(9,105,218,.12)' },
        order: 0 },                          // line drawn ON TOP of bars
      { label: 'Total Subscribers', data: active, type: 'line',
        borderColor: '#8250df', backgroundColor: 'transparent',
        borderDash: [4, 4], tension: .25, pointRadius: 2, borderWidth: 2,
        yAxisID: 'y1', order: 1 }
    ]},
    options: { responsive:true, maintainAspectRatio:false,
      interaction: { mode: 'index', intersect: false },
      plugins:{
        legend:{ position:'bottom', labels:{ font:{ size:11 }, boxWidth: 14 } },
        tooltip:{ callbacks:{
          label: c => {
            const v = c.parsed.y;
            if (c.dataset.label === 'Lost (unsubs)') {
              return `Lost (unsubs): ${Math.abs(Number(v) || 0).toLocaleString()}`;
            }
            if (c.dataset.label === 'Net Gain / Loss') {
              const x = Number(v) || 0;
              const sign = x > 0 ? '+' : x < 0 ? '−' : '';
              return `Net Gain / Loss: ${sign}${Math.abs(x).toLocaleString()}`;
            }
            return `${c.dataset.label}: ${Number(v || 0).toLocaleString()}`;
          }
        }}
      },
      scales:{
        // Zero line is thicker (visible anchor for the divergence). Tick
        // labels use Math.abs so the y axis reads "10K" on both sides.
        y:  { position:'left',  beginAtZero:true, stacked:true,
              title:{ display:true, text:'Monthly Δ (gained ↑ / lost ↓ / net line)' },
              ticks:{ callback: v => Math.abs(Number(v) || 0).toLocaleString() },
              grid:{ color: c => c.tick.value === 0 ? 'rgba(127,127,127,.55)' : 'rgba(127,127,127,.12)',
                     lineWidth: c => c.tick.value === 0 ? 2 : 1 } },
        y1: { position:'right', beginAtZero:false, grid:{ drawOnChartArea:false },
              title:{ display:true, text:'Total Subscribers' },
              ticks:{ callback: v => Number(v).toLocaleString() } }
      } }
  });
}
/* ═══════════════════════════════════════
   CAMPAIGNS
═══════════════════════════════════════ */
/* Campaign field parsers — campaign_table values are stored as formatted strings. */
function _campNum(v) {
  if (v == null) return 0;
  if (typeof v === 'number') return v;
  const n = parseFloat(String(v).replace(/[,%$\s]/g,''));
  return isFinite(n) ? n : 0;
}
function _campPct(v) {
  if (v == null) return null;
  if (typeof v === 'number') return v;
  const n = parseFloat(String(v).replace(/[%\s]/g,''));
  return isFinite(n) ? n : null;
}

/* ═══════════════════════════════════════
   WEEKLY DIGEST
═══════════════════════════════════════ */
/* Reads M.weekly_digest (produced by the comparison lambda — 9 ISO weeks of
 * headline metrics with the in-progress current week flagged). Compares the
 * **last completed week** (the second-to-last entry — the last entry is the
 * in-progress current week, which is excluded from deltas because it's
 * partial) against the **prior completed week** (third-to-last entry).
 * No flags, no exports yet — basic version. */
function renderDigest(M) {
  const wd = M.weekly_digest || null;
  const root = document.getElementById('digest');
  if (!root) return;
  if (!wd || !(wd.labels && wd.labels.length)) {
    root.innerHTML = `
      <div class="section-context-banner">
        <strong>Weekly Digest</strong> — Not populated yet. Re-run the comparison lambda to ship the <code>weekly_digest</code> payload.
      </div>`;
    return;
  }
  // Find the last-completed week (latest is_current = false). If every row
  // is is_current = true (edge case: only the current week has data) we
  // fall back to the last entry so the page at least renders something.
  const lastCompletedIdx = (() => {
    for (let i = wd.labels.length - 1; i >= 0; i--) {
      if (!wd.is_current[i]) return i;
    }
    return wd.labels.length - 1;
  })();
  const priorCompletedIdx = lastCompletedIdx - 1 >= 0 ? lastCompletedIdx - 1 : null;

  const num = arr => (arr && arr[lastCompletedIdx] != null ? Number(arr[lastCompletedIdx]) : null);
  const prv = arr => (arr && priorCompletedIdx != null && arr[priorCompletedIdx] != null ? Number(arr[priorCompletedIdx]) : null);

  // Top source for the last completed week — top_sources_by_week is sorted
  // week_start DESC then subs DESC, so the first row matching the last
  // completed week_start is the winner.
  const lastWeekStart = wd.week_starts[lastCompletedIdx];
  const topSrcRow = (wd.top_sources_by_week || []).find(r => r.week_start === lastWeekStart);
  const topSrc = topSrcRow ? `${utmLabel(topSrcRow.bucket)} (${Number(topSrcRow.subs).toLocaleString()})` : '—';

  // 8-week sparkline series for each metric. Pull every entry except the
  // in-progress current one so the sparkline shows completed weeks only.
  const sparkLabels = wd.labels.filter((_, i) => !wd.is_current[i]);
  const sparkOf = key => (wd[key] || []).filter((_, i) => !wd.is_current[i]);

  // Net change per week = new_subs - unsubs. Computed client-side from
  // the two arrays in the JSON so we don't need a new lambda field.
  const netChange      = (wd.new_subs || []).map((n, i) => Number(n||0) - Number((wd.unsubs || [])[i] || 0));
  const sparkNetChange = netChange.filter((_, i) => !wd.is_current[i]);
  const numFromArr = (arr) => (arr && arr[lastCompletedIdx] != null ? Number(arr[lastCompletedIdx]) : null);
  const prvFromArr = (arr) => (arr && priorCompletedIdx != null && arr[priorCompletedIdx] != null ? Number(arr[priorCompletedIdx]) : null);

  // Tile definitions: label, current/prior values, sparkline array, formatter,
  // "higher is better" hint for delta arrow colouring (null = neutral),
  // and an `isRate` flag so rate metrics render their delta in **pp**
  // (percentage points, absolute difference) and count metrics render
  // their delta as a plain integer diff. Relative-percent deltas are
  // intentionally not used here — they overstate moves on small bases
  // (e.g. click rate going 0.5% → 1% is +100% relative but only +0.5 pp).
  const tiles = [
    { label: 'Subscribers Net Change',  value: numFromArr(netChange),  prior: prvFromArr(netChange),  spark: sparkNetChange,            fmt: v => v == null ? '—' : (v >= 0 ? '+' : '') + Number(v).toLocaleString(),         higherIsBetter: true,  spark_color: '#1a7f37', isRate: false },
    { label: 'Churn % of Sends',         value: num(wd.churn_pct_of_sends), prior: prv(wd.churn_pct_of_sends), spark: sparkOf('churn_pct_of_sends'), fmt: v => v == null ? '—' : Number(v).toFixed(3) + '%',                       higherIsBetter: false, spark_color: '#cf222e', isRate: true  },
    { label: 'Campaigns Sent',           value: num(wd.campaigns_sent), prior: prv(wd.campaigns_sent), spark: sparkOf('campaigns_sent'), fmt: v => v == null ? '—' : Number(v).toLocaleString(),                                higherIsBetter: null,  spark_color: '#8250df', isRate: false },
    { label: 'Avg Open Rate',            value: num(wd.avg_open_rate),  prior: prv(wd.avg_open_rate),  spark: sparkOf('avg_open_rate'),  fmt: v => v == null ? '—' : Number(v).toFixed(2) + '%',                                higherIsBetter: true,  spark_color: '#1a7f37', isRate: true  },
    { label: 'Avg Click Rate',           value: num(wd.avg_click_rate), prior: prv(wd.avg_click_rate), spark: sparkOf('avg_click_rate'), fmt: v => v == null ? '—' : Number(v).toFixed(2) + '%',                                higherIsBetter: true,  spark_color: '#0969da', isRate: true  },
  ];

  // Delta always uses the **absolute** difference (current − prior):
  //   • rate tiles render it as percentage points (`pp`),
  //   • count tiles render it as a plain signed integer.
  // Relative percent change is intentionally not surfaced — it inflates
  // moves on small bases (e.g. a click rate going 0.5% → 1% is +100%
  // relative but only +0.5 pp).
  const deltaHTML = (t) => {
    if (t.value == null || t.prior == null) {
      return `<span style="font-size:11px;color:var(--text-muted);">vs prior — no data</span>`;
    }
    const diff = t.value - t.prior;
    const arrow = diff > 0 ? '▲' : diff < 0 ? '▼' : '–';
    const good  = t.higherIsBetter == null ? null
                : (diff === 0 ? null : (diff > 0) === t.higherIsBetter);
    const color = good == null ? 'var(--text-muted)' : good ? '#1a7f37' : '#cf222e';
    const magnitude = t.isRate ? `${Math.abs(diff).toFixed(2)} pp`
                                : `${Math.abs(diff).toLocaleString()}`;
    return `<span style="font-size:12px;font-weight:600;color:${color};">${arrow} ${magnitude}</span>
            <span style="font-size:11px;color:var(--text-muted);"> vs ${esc(_priorRangeShort)}</span>`;
  };
  const _MON_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const _weekRange = (idx) => {
    const ws = wd.week_starts && wd.week_starts[idx];
    if (!ws) return wd.labels && wd.labels[idx] ? wd.labels[idx] : '—';
    const start = new Date(ws + 'T00:00:00');
    if (isNaN(start)) return wd.labels[idx] || '—';
    const end = new Date(start.getTime() + 6 * 86400000);
    const sMon = _MON_SHORT[start.getMonth()];
    const eMon = _MON_SHORT[end.getMonth()];
    return sMon === eMon
      ? `${sMon} ${start.getDate()} – ${end.getDate()}`
      : `${sMon} ${start.getDate()} – ${eMon} ${end.getDate()}`;
  };
  const _priorRangeShort = priorCompletedIdx != null ? _weekRange(priorCompletedIdx) : 'prior';

  // Format an ISO Monday date as "Mon DD – Mon DD" covering Mon → Sun of that
  // ISO week. Falls back to the lambda's plain label if the week_start string
  // can't be parsed (e.g. lambda hasn't been re-run since week_starts was
  // added). Same month is collapsed: "May 11 – 17"; cross-month stays
  // "Apr 27 – May 3".

  const lastLabel  = _weekRange(lastCompletedIdx);
  const priorLabel = priorCompletedIdx != null ? _weekRange(priorCompletedIdx) : '—';

  root.innerHTML = `
    <div class="section-context-banner">
      <strong>Weekly Digest</strong> — Headline metrics for <strong>${esc(lastLabel)}</strong> (last completed Mon–Sun) compared against <strong>${esc(priorLabel)}</strong>. Sparklines show the 8 prior completed weeks (excluding the in-progress current week). <strong>Campaign aggregates count mass sends only — <code>Recipients ≥ 200,000</code></strong>; small dedicated / segmented sends are excluded so their atypical open / click rates don't drag the weekly averages.
    </div>

    <div class="kpi-row" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));">
      ${tiles.map((t, i) => `
        <div class="kpi-card" style="display:flex;flex-direction:column;gap:6px;">
          <div class="label">${esc(t.label)}</div>
          <div class="value" style="font-size:24px;">${t.fmt(t.value)}</div>
          <div>${deltaHTML(t)}</div>
          <div class="chart-container" style="height:48px;position:relative;margin-top:4px;">
            <canvas id="dig-spark-${i}"></canvas>
          </div>
        </div>
      `).join('')}
    </div>

    <!-- Slack-style summary block — mirrors the #weekly_automation
         post format. Numbers come from the same wd payload as the tiles
         above plus the last-completed-week's article-level rollup
         (top_content_this_week / top_sponsors_this_week /
         top_immersions_this_week). -->
    <!-- One chart-card per section so each visual gets its own header,
         padding, and border — matches the styling on every other tab.
         The actual markup for each card comes from _digestSummaryBody(),
         which returns five sibling .chart-card blocks rather than one
         wrapper card with the summary glued inside. -->
    ${_digestSummaryBody(wd, lastCompletedIdx, priorCompletedIdx, lastLabel)}
  `;

  // Sparklines — minimal Chart.js lines with axes hidden.
  tiles.forEach((t, i) => {
    const el = document.getElementById(`dig-spark-${i}`);
    if (!el) return;
    new Chart(el, {
      type: 'line',
      data: {
        labels: sparkLabels,
        datasets: [{
          data: t.spark.map(v => v == null ? null : Number(v)),
          borderColor: t.spark_color,
          backgroundColor: t.spark_color + '22',
          tension: 0.3, pointRadius: 0, borderWidth: 1.5, fill: true, spanGaps: true,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: {
          callbacks: { label: c => `${t.label}: ${t.fmt(c.parsed.y)}` }
        } },
        scales: { x: { display: false }, y: { display: false } },
        elements: { line: { borderJoinStyle: 'round' } },
      }
    });
  });

  // Doughnut + three horizontal-bar charts inside the summary block.
  _initDigestCharts();
}

/* Builds the visual summary block under the Weekly Digest tiles as a
 * sequence of standalone chart-cards (Overall stats / Sources doughnut /
 * Editorial / Sponsor / Immersion) so each section gets the same
 * heading, padding, and border treatment as the rest of the dashboard.
 * Returns markup with canvas placeholders; _initDigestCharts() is then
 * called by renderDigest() to instantiate the Chart.js objects after the
 * markup is injected. */
function _digestSummaryBody(wd, lastIdx, priorIdx, lastLabel) {
  const cur  = (key) => wd[key] && wd[key][lastIdx]  != null ? Number(wd[key][lastIdx])  : null;
  const prev = (key) => wd[key] && priorIdx != null && wd[key][priorIdx] != null ? Number(wd[key][priorIdx]) : null;
  const pp   = (a, b) => (a == null || b == null) ? null : (a - b);
  const fmtN = v => v == null ? '—' : Number(v).toLocaleString();
  const fmtP = (v, decimals = 2) => v == null ? '—' : Number(v).toFixed(decimals) + '%';
  const arrow = d => d == null ? '' : d > 0 ? '▲' : d < 0 ? '▼' : '–';
  const ppHTML = (deltaPP, higherIsBetter) => {
    if (deltaPP == null) return '';
    const good = higherIsBetter == null ? null : (deltaPP === 0 ? null : (deltaPP > 0) === higherIsBetter);
    const colour = good == null ? 'var(--text-muted)' : good ? '#1a7f37' : '#cf222e';
    return ` <span style="color:${colour};font-weight:600;">${arrow(deltaPP)} ${Math.abs(deltaPP).toFixed(2)} pp</span>`;
  };

  // ── Card 1: Overall (text-only stats strip)
  const camps     = cur('campaigns_sent') || 0;
  const totalSent = cur('total_sent')     || 0;
  const openR     = cur('avg_open_rate');
  const clickR    = cur('avg_click_rate');
  const unsubR    = cur('churn_pct_of_sends');
  const overall = `
    <div class="chart-card" style="margin-top:18px;">
      <h3>Overall — ${esc(lastLabel || '')} <span class="badge-inline">campaign aggregates</span></h3>
      <div style="font-size:13px;line-height:1.6;color:var(--text);">
        <strong>${fmtN(camps)} campaign${camps === 1 ? '' : 's'}</strong>
        &nbsp;· ${fmtN(totalSent)} sent
        &nbsp;· ${fmtP(openR)} open rate${ppHTML(pp(openR,  prev('avg_open_rate')),  true)}
        &nbsp;· ${fmtP(clickR)} click rate${ppHTML(pp(clickR, prev('avg_click_rate')), true)}
        &nbsp;· ${fmtP(unsubR, 3)} unsub${ppHTML(pp(unsubR, prev('churn_pct_of_sends')), false)}
      </div>
      <div class="insight">
        Aggregates over campaigns with <code>Recipients &ge; 200,000</code> only — mass sends. Small dedicated / segmented sends are excluded so their atypical open / click rates don't skew the weekly averages.
        <code>Recipients</code> itself is not deduplicated — same subscriber receiving N emails counts N×.
        Unsub rate = unsubs ÷ <code>total_sent</code> × 100. Deltas vs prior completed week (pp = percentage points).
      </div>
    </div>`;

  // ── Source breakdown — was a text line, now a doughnut with the
  // canonical labels + sub counts driving the slices. Cache the dataset
  // on window so _initDigestCharts can read it after innerHTML.
  const lastWeekStart = wd.week_starts && wd.week_starts[lastIdx];
  const allSrc = (wd.top_sources_by_week || []).filter(r => r.week_start === lastWeekStart);
  const totalNew = allSrc.reduce((a, r) => a + (Number(r.subs) || 0), 0);
  window._digSrcData = allSrc;
  window._digSrcTotal = totalNew;

  // ── Card 2: Sources doughnut
  const sourceBlock = (allSrc.length === 0)
    ? `<div class="chart-card">
        <h3>New Subscribers by Source</h3>
        <div class="insight" style="font-style:italic;">No new subscribers recorded this week.</div>
      </div>`
    : `<div class="chart-card">
        <h3>New Subscribers by Source <span class="badge-inline">total: ${fmtN(totalNew)}</span></h3>
        <div class="chart-container h300"><canvas id="dig-src-pie"></canvas></div>
        <div class="insight">Canonical-source split of subscribers who joined during the last completed week. Click a legend entry to hide that slice.</div>
      </div>`;

  // ── Three article-section horizontal bars — Editorial / Sponsor /
  // Immersion. Each canvas is sized to fit ~5 rows; rendered by
  // _initDigestCharts. Empty sections collapse to a muted "none this
  // week." note so the layout doesn't shift when there are no rows.
  // ── Cards 3-5: Editorial / Sponsor / Immersion — all use the text-row
  // helper below. Each row is its own bordered tile so the article URL is
  // visible at-a-glance instead of being hidden behind a tooltip. (The
  // earlier bar-chart variant — sectionBlock + per-canvas init in
  // _initDigestCharts — was retired in favour of one consistent
  // representation across all three categories.)
  //
  // Text-row block — each row is
  // its own bordered tile that shows the title (linked), the issue +
  // send date, the URL backing the row (small + monospace + clickable),
  // and the unique / total clicks. Used in place of the bar chart so the
  // URL is visible at-a-glance instead of hidden behind a tooltip.
  const textRowBlock = (heading, rows, badge) => {
    const data = (rows || []).slice(0, 5);
    if (!data.length) {
      return `<div class="chart-card">
        <h3>${esc(heading)}</h3>
        <div class="insight" style="font-style:italic;">No ${esc(heading.toLowerCase())} this week.</div>
      </div>`;
    }
    const badgeHTML = badge ? ` <span class="badge-inline">${esc(badge)}</span>` : '';
    const items = data.map(r => {
      const titleLine = r.url
        ? `<a href="${esc(r.url)}" target="_blank" rel="noopener" style="font-weight:600;color:var(--text);text-decoration:none;">${esc(r.title || '(untitled)')}</a>`
        : `<span style="font-weight:600;color:var(--text);">${esc(r.title || '(untitled)')}</span>`;
      const meta = [];
      if (r.issue_name) meta.push(`<span>Issue: <strong>${esc(r.issue_name)}</strong></span>`);
      if (r.issue_date) meta.push(`<span>Sent: <strong>${esc(String(r.issue_date).slice(0,10))}</strong></span>`);
      const metaLine = meta.length
        ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${meta.join(' &middot; ')}</div>`
        : '';
      const urlLine = r.url
        ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px;word-break:break-all;"><code>${esc(r.url)}</code></div>`
        : '';
      const stats = `<div style="font-size:12px;color:var(--text);white-space:nowrap;margin-left:14px;">
        <strong>${fmtN(r.unique_clicks)}</strong> unique <span style="color:var(--text-muted);">&middot; ${fmtN(r.total_clicks)} total</span>
      </div>`;
      return `<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:1px solid var(--row-border);">
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;">${titleLine}</div>
          ${metaLine}
          ${urlLine}
        </div>
        ${stats}
      </div>`;
    }).join('');
    return `<div class="chart-card">
      <h3>${esc(heading)}${badgeHTML}</h3>
      <div style="margin-top:6px;">${items}</div>
      <div class="insight">Top 5 by unique clicks. Title and URL link out to the article in a new tab.</div>
    </div>`;
  };

  const editorial  = textRowBlock('Editorial Clicks', wd.top_editorial_this_week || wd.top_content_this_week, 'type = editorial');
  const sponsors   = textRowBlock('Sponsor Clicks',   wd.top_sponsors_this_week, 'type = sponsor');
  const immersions = textRowBlock('Immersion Clicks', wd.top_immersions_this_week, 'type = immersion');

  // The three article cards stack vertically (each its own row), and all
  // three now use the text-row format so the article URL is visible
  // at-a-glance without needing a hover.
  return overall + sourceBlock + editorial + sponsors + immersions;
}

/* Instantiates the Chart.js charts inside the Weekly Digest summary block.
 * Must run AFTER _digestSummaryBody's HTML is injected — `renderDigest`
 * calls it at the end of its render pass. Reads its data from
 * window._digSrcData / window._dig_<canvasId> stashed by the body fn. */
function _initDigestCharts() {
  const palette = ['#0969da','#cf222e','#8250df','#9a6700','#bf3989','#1b7c83','#1a7f37','#58a6ff','#3fb950','#fb8500','#fb6f92','#7d4e00','#4f8cff','#34d399','#a78bfa','#f87171','#fbbf24'];

  // Sources doughnut
  const srcCanvas = document.getElementById('dig-src-pie');
  const allSrc = window._digSrcData || [];
  const totalNew = window._digSrcTotal || 0;
  if (srcCanvas && allSrc.length) {
    new Chart(srcCanvas, {
      type: 'doughnut',
      data: {
        labels: allSrc.map(r => utmLabel(r.bucket)),
        datasets: [{ data: allSrc.map(r => Number(r.subs) || 0),
                     backgroundColor: allSrc.map((_, i) => palette[i % palette.length]),
                     borderWidth: 1 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { font: { size: 11 }, padding: 6, boxWidth: 12 } },
          tooltip: { callbacks: { label: c => {
            const pct = totalNew ? (c.parsed / totalNew * 100).toFixed(2) : '0.00';
            return `${c.label}: ${Number(c.parsed).toLocaleString()} (${pct}%)`;
          }}}
        }
      }
    });
  }

  // The per-article horizontal-bar charts that used to live here were
  // retired when Editorial / Sponsor / Immersion all switched to the
  // text-row representation. _initDigestCharts() now only handles the
  // Sources doughnut.
}

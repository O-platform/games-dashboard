const CAMP_PAGE_SIZE = 20;

function _filterCampaigns() {
  const showSS = document.getElementById('hideSundaySpotlight').checked;
  let rows = window._campData || [];
  if (!showSS) rows = rows.filter(r => !_isSundayCampaign(r));
  window._campFiltered = rows;
  window._campFilteredCount = rows.length;
  window._campPage = 1;

  const stateEl = document.getElementById('camp-filter-state');
  if (stateEl) stateEl.textContent = showSS ? 'Including branded digest sends' : 'Excluding branded digest sends';
  const scopeEl = document.getElementById('camp-scope-label');
  if (scopeEl) scopeEl.innerHTML = `<strong style="color:var(--text);">${rows.length}</strong> campaign${rows.length===1?'':'s'} in scope`;

  _renderCampKpis(rows);
  _renderCampCharts(rows);
  _renderCampPage();
}

function _renderCampKpis(rows) {
  const n = rows.length;
  const sum = (k, num) => rows.reduce((a,r) => a + num(r[k]), 0);
  const totRecip   = sum('recipients',   _campNum);
  const totOpens   = sum('unique_opens', _campNum);
  const totClicks  = sum('clicks',       _campNum);
  const totUnsubs  = sum('unsubs',       _campNum);
  const openRates  = rows.map(r => _campPct(r.open_rate)).filter(v => v != null);
  const clickRates = rows.map(r => _campPct(r.click_rate)).filter(v => v != null);
  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0) / arr.length : 0;
  const avgOpen  = avg(openRates);
  const avgClick = avg(clickRates);
  const bestOpen  = openRates.length  ? Math.max(...openRates)  : 0;
  const bestClick = clickRates.length ? Math.max(...clickRates) : 0;
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  set('kpi-camp-count', fmt(n));
  set('kpi-avg-open',   avgOpen.toFixed(2) + '%');
  set('kpi-avg-click',  avgClick.toFixed(2) + '%');
  set('kpi-best-open',  bestOpen.toFixed(2) + '%');
  set('kpi-best-click', bestClick.toFixed(2) + '%');
  set('kpi-recipients', fmt(totRecip));
  set('kpi-unique-opens', fmt(totOpens));
  set('kpi-clicks',     fmt(totClicks));
  set('kpi-unsubs',     fmt(totUnsubs));
}

function _renderCampCharts(rows) {
  // Top 15 by open rate, recomputed from the filtered set
  const top15 = [...rows]
    .map(r => ({ name: r.name, open_rate: _campPct(r.open_rate) || 0 }))
    .sort((a,b) => b.open_rate - a.open_rate)
    .slice(0, 15);
  if (window._campTopBarChart) window._campTopBarChart.destroy();
  window._campTopBarChart = new Chart(document.getElementById('camp-top-bar'), {
    type: 'bar',
    data: { labels: top15.map(r => r.name), datasets: [{ label: 'Open Rate %', data: top15.map(r => r.open_rate), backgroundColor: '#3fb950', borderRadius: 4 }] },
    options: { responsive:true, maintainAspectRatio:false, indexAxis:'y',
      scales: { x: { beginAtZero:true, ticks: { callback: v => v + '%' } } },
      plugins: { legend: { display:false } } }
  });

  if (window._campScatterChart) window._campScatterChart.destroy();
  window._campScatterChart = new Chart(document.getElementById('camp-scatter'), {
    type: 'scatter',
    data: { datasets: [{ label:'Campaigns', data: rows.map(r => ({ x: _campPct(r.open_rate)||0, y: _campPct(r.click_rate)||0, label: r.name })), backgroundColor:'rgba(63,185,80,.55)', pointRadius:5 }] },
    options: { responsive:true, maintainAspectRatio:false,
      scales: {
        x: { title: { display:true, text:'Open Rate %' }, ticks: { callback: v => v + '%' } },
        y: { title: { display:true, text:'Click Rate %' }, ticks: { callback: v => v + '%' } }
      },
      plugins: { legend: { display:false }, tooltip: { callbacks: { label: ctx => ctx.raw.label + ' — OR ' + ctx.raw.x.toFixed(2) + '% / CR ' + ctx.raw.y.toFixed(2) + '%' } } } }
  });
}

function _campGoto(p) {
  const total = window._campFilteredCount || 0;
  const maxPage = Math.max(1, Math.ceil(total / CAMP_PAGE_SIZE));
  window._campPage = Math.min(Math.max(1, p), maxPage);
  _renderCampPage();
}
function _campCell(v) {
  if (v == null) return '—';
  if (typeof v === 'string') return esc(v) || '—';
  return fmt(v);
}
function _renderCampPage() {
  const rows = window._campFiltered || [];
  const total = rows.length;
  const page = window._campPage || 1;
  const pages = Math.max(1, Math.ceil(total / CAMP_PAGE_SIZE));
  const start = (page - 1) * CAMP_PAGE_SIZE;
  const end = Math.min(start + CAMP_PAGE_SIZE, total);
  const slice = rows.slice(start, end);
  const wrap = document.getElementById('camp-table-wrap');
  if (!wrap) return;
  wrap.innerHTML = `<div class="tbl-wrap"><table class="dash-table">
    <thead><tr><th>#</th><th>Campaign</th><th>Subject</th><th>Sent Date</th><th>Total Sent Emails</th><th>Unique Opens</th><th>Open Rate</th><th>Clicks</th><th>Click Rate</th><th>Unsubs</th></tr></thead>
    <tbody>${slice.map((c,i)=>{
      const nameCell = c.url ? `<a href="${esc(c.url)}" target="_blank" rel="noopener">${esc(c.name||'')}</a>` : esc(c.name||'');
      return `<tr><td>${start+i+1}</td><td>${nameCell}</td><td>${esc(c.subject||'')}</td><td class="nowrap">${c.sent_date||''}</td><td>${_campCell(c.recipients)}</td><td>${_campCell(c.unique_opens)}</td><td>${c.open_rate||'—'}</td><td>${_campCell(c.clicks)}</td><td>${c.click_rate||'—'}</td><td>${_campCell(c.unsubs)}</td></tr>`;
    }).join('')}</tbody></table></div>`;
  const pager = document.getElementById('camp-pager');
  if (pager) {
    const btn = (label, p, disabled, active) =>
      `<button class="camp-pager-btn${active?' active':''}" onclick="_campGoto(${p})" ${disabled?'disabled':''}>${label}</button>`;
    const numBtns = [];
    const windowSize = 7;
    let lo = Math.max(1, page - Math.floor(windowSize/2));
    let hi = Math.min(pages, lo + windowSize - 1);
    lo = Math.max(1, hi - windowSize + 1);
    for (let p=lo; p<=hi; p++) numBtns.push(btn(String(p), p, false, p===page));
    pager.innerHTML =
      `<span>Showing <strong style="color:var(--text);">${total ? (start+1) : 0}–${end}</strong> of <strong style="color:var(--text);">${total.toLocaleString()}</strong> · Page ${page} of ${pages}</span>
       <div style="display:flex;gap:5px;flex-wrap:wrap;">
         ${btn('« First', 1, page===1)}${btn('‹ Prev', page-1, page===1)}
         ${numBtns.join('')}
         ${btn('Next ›', page+1, page===pages)}${btn('Last »', pages, page===pages)}
       </div>`;
  }
}

/* ═══════════════════════════════════════
   CLICK ANALYSIS  (was: Website Content)
═══════════════════════════════════════ */
function _clickTrendInsight(series, metric, unit, fmtVal) {
  // Compare the LAST TWO COMPLETED periods — skip any bar flagged is_current
  // so partial weeks/months don't produce a misleading drop.
  const data = series[metric] || [];
  const isc  = series.is_current || [];
  const completed = [];
  for (let i = data.length - 1; i >= 0; i--) {
    if (!isc[i] && data[i] != null) completed.push(i);
    if (completed.length === 2) break;
  }
  if (completed.length < 2) return '';
  const cur  = Number(data[completed[0]]) || 0;
  const prev = Number(data[completed[1]]) || 0;
  if (prev === 0 && cur === 0) return '';
  const pct = prev > 0 ? ((cur - prev) / prev * 100) : 100;
  const dir = pct >= 0 ? '↑' : '↓';
  const clr = pct >= 0 ? 'var(--green)' : 'var(--red)';
  const f = fmtVal || (v => fmt(v));
  return `<strong style="color:${clr}">${dir} ${Math.abs(pct).toFixed(1)}%</strong> vs previous (${f(cur)} vs ${f(prev)} ${unit})`;
}
/* Properly tear down the old Chart instance, reset any inline sizing the
 * previous render left on the canvas, then hand a clean canvas back. Without
 * destroy() the old chart's ResizeObserver keeps firing on the old (detached)
 * canvas; without clearing style/width/height attrs Chart.js sometimes reads
 * the old size instead of the container, which is why the chart looked half-
 * size after toggling the Sunday Spotlight filter. */
function _resetCanvas(id) {
  const old = document.getElementById(id);
  if (!old) return null;
  if (old._chart) { try { old._chart.destroy(); } catch (e) {} old._chart = null; }
  const fresh = old.cloneNode(false);
  fresh.removeAttribute('style');
  fresh.removeAttribute('width');
  fresh.removeAttribute('height');
  old.parentNode.replaceChild(fresh, old);
  return fresh;
}

/* Create a chart and then force a resize on the next animation frame so it
 * recomputes against the parent container after layout settles. Belt-and-
 * braces against the "chart shrinks after toggle" Chart.js bug. */
function _newChart(ctx, cfg) {
  const c = new Chart(ctx, cfg);
  requestAnimationFrame(() => { try { c.resize(); } catch (e) {} });
  return c;
}

function _clickTrendChart(canvasId, series, metric, color, label, tickFormat) {
  const labels = series.labels || [];
  const data   = series[metric] || [];
  const cur    = series.is_current || [];
  const camps  = series.campaigns || [];
  const tickFn = tickFormat || (v => v.toLocaleString());
  const bg = data.map((_,i) => cur[i] ? color + '66' : color);
  const border = data.map((_,i) => cur[i] ? color : 'transparent');
  const ctx = _resetCanvas(canvasId);
  if (!ctx) return;
  ctx._chart = _newChart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{
      label,
      data,
      backgroundColor: bg,
      borderColor: border,
      borderWidth: 2,
      borderRadius: 4
    }]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{ display:false },
        tooltip:{ callbacks:{
          afterLabel: (c) => {
            const lines = [];
            if (camps[c.dataIndex] != null) lines.push(`Campaigns: ${camps[c.dataIndex]}`);
            if (cur[c.dataIndex]) lines.push('(in progress — excluded from comparison)');
            return lines;
          }
        }}
      },
      scales:{ y:{ beginAtZero:true, ticks:{ callback: v => tickFn(v) } } } }
  });
}

/* Raw-click section state for weekday/week-range selectors */
let _rawClicksData = null;
const _weekdayLong = { Mon:'Monday', Tue:'Tuesday', Wed:'Wednesday', Thu:'Thursday', Fri:'Friday', Sat:'Saturday', Sun:'Sunday' };

/* Click Analysis — toolbar state helpers.
 * `_ssOn()` returns true when the user wants Sunday Spotlight INCLUDED
 * (toggle checked). Default OFF (excluded), matching the Campaigns tab.
 * `_rawMetric(series)` picks the right field for raw-click series:
 *   - SS included → 'clicks'
 *   - SS excluded AND lambda emitted 'clicks_no_ss' → 'clicks_no_ss'
 *   - Otherwise fall back to 'clicks' (older lambda output).
 */
function _ssOn() {
  const el = document.getElementById('clicksIncludeSS');
  return el ? el.checked : false;
}
/* Sunday-Spotlight detection — by send-date day-of-week, not by campaign
 * name. Sunday Spotlight is the digest blast that goes out on Sunday, so
 * the canonical test is "was this campaign sent on a Sunday?". The
 * previous implementation matched campaign names containing the literal
 * string "sunday spotlight", which silently misclassified any Sunday send
 * that wasn't named that way (and would also catch a non-Sunday send
 * that happened to have the words in its name).
 *
 * Expects a campaign-table row `c` with a `sent_date` string in
 * "YYYY-MM-DD" form (the shape the lambda emits). Parses at noon to dodge
 * timezone / DST edges. Returns false for missing / unparseable dates so
 * orphaned rows default to "kept in scope". */
function _isSundayCampaign(c) {
  if (!c || !c.sent_date) return false;
  const d = new Date(c.sent_date + 'T12:00:00');
  return !isNaN(d) && d.getDay() === 0; /* 0 = Sunday */
}
function _rawMetric(series) {
  if (_ssOn()) return 'clicks';
  return (series && Array.isArray(series.clicks_no_ss)) ? 'clicks_no_ss' : 'clicks';
}

/* Section 1 client-side aggregation from M.campaign_table.
 * Lets us filter Sunday Spotlight and switch between Total / Per-campaign /
 * Click-to-Open % without needing a lambda re-run.
 */
function _isoWeekStart(d) {
  const x = new Date(d);
  if (isNaN(x)) return null;
  const day = x.getDay();
  const back = day === 0 ? 6 : day - 1;
  x.setHours(0,0,0,0);
  x.setDate(x.getDate() - back);
  return x;
}
function _monthStart(d) {
  const x = new Date(d);
  if (isNaN(x)) return null;
  x.setHours(0,0,0,0);
  x.setDate(1);
  return x;
}
const _fmtWeekLabel  = d => d.toLocaleDateString('en-US', { month:'short', day:'2-digit' });
const _fmtMonthLabel = d => d.toLocaleDateString('en-US', { month:'short', year:'numeric' });

function _buildCampaignSeries(rows, periodFn, formatter, limit) {
  const today = new Date(); today.setHours(0,0,0,0);
  const todayKey = periodFn(today).getTime();
  const groups = new Map();
  rows.forEach(c => {
    const d = new Date(c.sent_date || '');
    if (isNaN(d)) return;
    const k = periodFn(d).getTime();
    if (!groups.has(k)) groups.set(k, { clicks:0, opens:0, recipients:0, n:0 });
    const g = groups.get(k);
    g.clicks     += _campNum(c.clicks);
    g.opens      += _campNum(c.unique_opens);
    g.recipients += _campNum(c.recipients);
    g.n          += 1;
  });
  let keys = [...groups.keys()].sort((a,b) => a - b);
  if (limit && keys.length > limit) keys = keys.slice(keys.length - limit);
  return {
    labels:       keys.map(k => formatter(new Date(k))),
    clicks:       keys.map(k => groups.get(k).clicks),
    per_campaign: keys.map(k => { const g = groups.get(k); return g.n ? Math.round(g.clicks / g.n) : 0; }),
    ctor:         keys.map(k => { const g = groups.get(k); return g.opens ? Number((g.clicks / g.opens * 100).toFixed(1)) : 0; }),
    campaigns:    keys.map(k => groups.get(k).n),
    unique_opens: keys.map(k => groups.get(k).opens),
    recipients:   keys.map(k => groups.get(k).recipients),
    is_current:   keys.map(k => k === todayKey)
  };
}

function _renderClickSection1() {
  const includeSS = _ssOn();
  const metric    = (document.getElementById('clicksMetric') || {}).value || 'clicks';
  const stateEl   = document.getElementById('clicks-ss-state');
  if (stateEl) stateEl.textContent = includeSS ? 'Including branded digest sends' : 'Excluding branded digest sends';
  const table = (_rawClicksData && _rawClicksData.campaign_table) || [];
  const rows  = table.filter(c => includeSS ? true : !_isSundayCampaign(c));
  const weekly  = _buildCampaignSeries(rows, _isoWeekStart, _fmtWeekLabel,  8);
  const monthly = _buildCampaignSeries(rows, _monthStart,  _fmtMonthLabel, 6);
  const isCtor    = metric === 'ctor';
  const isPerCamp = metric === 'per_campaign';
  const metricLabel = isPerCamp ? 'Clicks / campaign' : (isCtor ? 'Click-to-Open %' : 'Total clicks');
  const unitLabel   = isPerCamp ? 'clicks/campaign'  : (isCtor ? 'CTOR'             : 'clicks');
  const tickFmt     = isCtor ? (v => v.toFixed(1) + '%') : (v => Number(v).toLocaleString());
  const valFmt      = isCtor ? (v => Number(v).toFixed(1) + '%') : (v => Number(v).toLocaleString());
  _clickTrendChart('cnt-weekly-bar',  weekly,  metric, '#0969da', metricLabel, tickFmt);
  _clickTrendChart('cnt-monthly-bar', monthly, metric, '#1a7f37', metricLabel, tickFmt);
  const wIns = document.getElementById('cnt-weekly-insight');
  if (wIns) {
    const txt = _clickTrendInsight(weekly, metric, unitLabel, valFmt);
    wIns.innerHTML = txt
      ? `WoW (last 2 completed weeks): ${txt}. The faded bar is the current (in-progress) week — excluded from the comparison.`
      : `Not enough completed weeks for a WoW comparison yet.`;
  }
  const mIns = document.getElementById('cnt-monthly-insight');
  if (mIns) {
    const txt = _clickTrendInsight(monthly, metric, unitLabel, valFmt);
    mIns.innerHTML = txt
      ? `MoM (last 2 completed months): ${txt}. The faded bar is the current (in-progress) month — excluded from the comparison.`
      : `Not enough completed months for a MoM comparison yet.`;
  }
}

function _sliceSeries(series, n) {
  if (!series || !series.labels) return series || {};
  const len = series.labels.length;
  if (n >= len) return series;
  const sl = (arr) => Array.isArray(arr) ? arr.slice(len - n) : arr;
  const out = {};
  for (const k of Object.keys(series)) out[k] = sl(series[k]);
  return out;
}

/* Same Weekday chart — campaign-send view.
 * For each weekday (Mon–Sun), we show the last `n` campaigns sent on that
 * weekday (from M.campaign_table) with their *total clicks*. Bars are
 * coloured green when above that weekday's average and red when below,
 * with in-progress sends (< 2 days old) shown in pale grey because their
 * click totals are still accumulating.
 */
function _setWeekdayWindow(n) {
  if (!_rawClicksData) return;
  window._rawWeekdayN = n;
  ['rwd-2','rwd-3','rwd-5'].forEach(id => {
    const btn = document.getElementById(id);
    if (!btn) return;
    const active = parseInt(id.split('-')[1]) === n;
    btn.style.background = active ? 'var(--accent)' : 'var(--card)';
    btn.style.color = active ? '#fff' : 'var(--text-muted)';
  });
  const dows = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const ssOn = _ssOn();
  const today = new Date(); today.setHours(0,0,0,0);
  const inProgressCutoff = today.getTime() - 2 * 86400000;

  // Bucket every campaign by the weekday it was sent on.
  const table = (_rawClicksData && _rawClicksData.campaign_table) || [];
  const byDow = { Mon:[], Tue:[], Wed:[], Thu:[], Fri:[], Sat:[], Sun:[] };
  table.forEach(c => {
    if (!ssOn && _isSundayCampaign(c)) return;
    const d = new Date(c.sent_date || '');
    if (isNaN(d)) return;
    const dow = dows[((d.getDay()+6) % 7)];   // 0=Mon … 6=Sun
    byDow[dow].push({
      sent:       d,
      label:      d.toLocaleDateString('en-US', { month:'short', day:'2-digit', year:'2-digit' }),
      name:       c.name || '',
      clicks:     _campNum(c.clicks),
      inProgress: d.getTime() >= inProgressCutoff
    });
  });

  // Keep the most recent `n` per weekday.
  let weekdaysWithData = 0;
  dows.forEach(d => {
    byDow[d].sort((a,b) => b.sent - a.sent);
    if (byDow[d].length) weekdaysWithData++;
    byDow[d] = byDow[d].slice(0, n);
  });

  // Average per weekday — excludes in-progress sends so their incomplete
  // totals don't drag the baseline down for the rest of the bars.
  const avgs = {};
  dows.forEach(d => {
    const done = byDow[d].filter(x => !x.inProgress);
    avgs[d] = done.length ? done.reduce((s,x) => s + x.clicks, 0) / done.length : 0;
  });

  // Build n datasets — index `positionFromEnd = n-1-i` reads "0 = most recent".
  // Each bar gets its own colour: green if ≥ that weekday's average, red if
  // below, pale grey if still in-progress (excluded from the comparison).
  const GREEN     = 'rgba(63,185,80,0.85)';
  const RED       = 'rgba(248,81,73,0.85)';
  const INP_GREY  = 'rgba(140,149,159,0.45)';
  const INP_BORDER = 'rgba(140,149,159,0.85)';
  const datasets = [];
  for (let i = 0; i < n; i++) {
    const positionFromEnd = n - 1 - i;        // 0 = most recent
    const labelTxt = positionFromEnd === 0 ? 'Most recent'
                   : positionFromEnd === 1 ? '1 week back'
                   : `${positionFromEnd} weeks back`;
    const data = dows.map(d => {
      const row = byDow[d][positionFromEnd];
      return row ? row.clicks : null;
    });
    const bg = dows.map(d => {
      const row = byDow[d][positionFromEnd];
      if (!row) return 'transparent';
      if (row.inProgress) return INP_GREY;
      return row.clicks >= avgs[d] ? GREEN : RED;
    });
    const borderColor = dows.map(d => {
      const row = byDow[d][positionFromEnd];
      return (row && row.inProgress) ? INP_BORDER : 'transparent';
    });
    datasets.push({
      label: labelTxt,
      data,
      backgroundColor: bg,
      borderColor,
      borderWidth: 1.5,
      _dates: dows.map(d => byDow[d][positionFromEnd]?.label || ''),
      _names: dows.map(d => byDow[d][positionFromEnd]?.name  || ''),
      _inProg: dows.map(d => !!byDow[d][positionFromEnd]?.inProgress),
      _avg:    dows.map(d => avgs[d]),
      borderRadius: 3
    });
  }

  const ctx = _resetCanvas('cnt-raw-weekday-bar');
  if (!ctx) return;
  ctx._chart = _newChart(ctx, {
    type: 'bar',
    data: { labels: dows.map(d => _weekdayLong[d]||d), datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: {
          title: (items) => items.length ? (items[0].chart.data.labels[items[0].dataIndex] || '') : '',
          label: (c) => {
            const ds = c.dataset;
            const date = (ds._dates && ds._dates[c.dataIndex]) || '';
            const name = (ds._names && ds._names[c.dataIndex]) || '';
            const inP  = (ds._inProg && ds._inProg[c.dataIndex]) || false;
            const avg  = (ds._avg   && ds._avg[c.dataIndex])    || 0;
            const val  = (c.parsed && c.parsed.y != null) ? Number(c.parsed.y) : 0;
            const lines = [];
            lines.push(`${name || ds.label}${date ? ' — '+date : ''}`);
            lines.push(`${val.toLocaleString()} total clicks`);
            if (inP) lines.push('(in progress — < 2 days since send)');
            else if (avg > 0) {
              const diff = ((val - avg) / avg * 100);
              const dir = diff >= 0 ? '↑' : '↓';
              lines.push(`Weekday avg: ${Math.round(avg).toLocaleString()} (${dir} ${Math.abs(diff).toFixed(1)}%)`);
            }
            return lines;
          }
        }}
      },
      interaction: { mode: 'index', intersect: false },
      scales: { y: { beginAtZero: true, ticks: { callback: v => v.toLocaleString() } } }
    }
  });

  const badge = document.getElementById('cnt-raw-weekday-badge');
  if (badge) badge.textContent = `— last ${n} sends per weekday, total clicks per send`;
  const ins = document.getElementById('cnt-raw-weekday-insight');
  if (ins) {
    const legend = `<span style="display:inline-block;width:10px;height:10px;background:${GREEN};border-radius:2px;vertical-align:middle;margin:0 4px 1px 0;"></span>above that weekday's average · `
                 + `<span style="display:inline-block;width:10px;height:10px;background:${RED};border-radius:2px;vertical-align:middle;margin:0 4px 1px 6px;"></span>below average · `
                 + `<span style="display:inline-block;width:10px;height:10px;background:${INP_GREY};border:1px solid ${INP_BORDER};border-radius:2px;vertical-align:middle;margin:0 4px 1px 6px;"></span>in progress (&lt; 2 days since send)`;
    ins.innerHTML = weekdaysWithData < 7
      ? `Showing campaigns for <strong>${weekdaysWithData} of 7</strong> weekdays — only weekdays with at least one send appear. <br>${legend}`
      : `Hover anywhere in a column to see its tooltip. <br>${legend}`;
  }

  // Compact data table — one row per send slot (most-recent first), columns = weekdays.
  const tbl = document.getElementById('cnt-raw-weekday-table');
  if (tbl) {
    const activeDows = dows.filter(d => byDow[d].length > 0);
    let html = `<table style="width:100%;border-collapse:collapse;font-size:11px;margin-top:8px;">`;
    html += `<thead><tr><th style="text-align:left;padding:3px 6px;color:var(--text-muted);font-weight:500;border-bottom:1px solid var(--card-border);">Send slot</th>`;
    activeDows.forEach(d => {
      html += `<th style="text-align:right;padding:3px 6px;color:var(--text-muted);font-weight:500;border-bottom:1px solid var(--card-border);">${d}</th>`;
    });
    html += `</tr></thead><tbody>`;
    for (let i = 0; i < n; i++) {
      const positionFromEnd = n - 1 - i;
      const rowLabel = positionFromEnd === 0 ? 'Most recent'
                     : positionFromEnd === 1 ? '1 week back'
                     : `${positionFromEnd} weeks back`;
      html += `<tr>`;
      html += `<td style="padding:3px 6px;color:var(--text-muted);">${rowLabel}</td>`;
      activeDows.forEach(d => {
        const row = byDow[d][positionFromEnd];
        if (!row) { html += `<td style="padding:3px 6px;text-align:right;color:var(--text-muted);">—</td>`; return; }
        const color = row.inProgress ? INP_GREY
                    : row.clicks >= avgs[d] ? GREEN : RED;
        const tip = `${row.name}${row.label ? ' ('+row.label+')' : ''}`;
        html += `<td style="padding:3px 6px;text-align:right;font-weight:500;" title="${tip.replace(/"/g,'&quot;')}">`;
        html += `<span style="display:inline-block;width:7px;height:7px;background:${color};border-radius:50%;margin-right:4px;vertical-align:middle;"></span>`;
        html += `${row.clicks.toLocaleString()}</td>`;
      });
      html += `</tr>`;
    }
    html += `</tbody></table>`;
    tbl.innerHTML = html;
  }
}

function _setRawWeeklyWindow(n) {
  if (!_rawClicksData) return;
  window._rawWeeklyN = n;
  ['rww-4','rww-8','rww-12'].forEach(id => {
    const btn = document.getElementById(id);
    if (!btn) return;
    const active = parseInt(id.split('-')[1]) === n;
    btn.style.background = active ? 'var(--accent)' : 'var(--card)';
    btn.style.color = active ? '#fff' : 'var(--text-muted)';
  });
  const series = _sliceSeries(_rawClicksData.raw_clicks_weekly || {}, n);
  const m = _rawMetric(series);
  _clickTrendChart('cnt-raw-weekly-bar', series, m, '#bf3989', 'Click events');

/* Click Analysis KPIs — campaigns sent / total recipients / total clicks /
 * avg clicks per campaign, re-aggregated from M.campaign_table against the
 * current Sunday Spotlight toggle so the headline numbers always match the
 * Section 1 chart series below. */
function _renderClickKpis() {
  const includeSS = _ssOn();
  const table = (_rawClicksData && _rawClicksData.campaign_table) || [];
  const rows  = table.filter(c => includeSS ? true
                                            : !_isSundayCampaign(c));
  let camps = 0, recip = 0, clicks = 0;
  rows.forEach(c => {
    camps  += 1;
    recip  += _campNum(c.recipients);
    clicks += _campNum(c.clicks);
  });
  const avg = camps ? Math.round(clicks / camps) : 0;
  const set = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };
  set('ca-kpi-camps',  camps.toLocaleString());
  set('ca-kpi-recip',  recip.toLocaleString());
  set('ca-kpi-clicks', clicks.toLocaleString());
  set('ca-kpi-avg',    camps ? avg.toLocaleString() : '—');
}

/* Section 3 KPI tiles — subscriber-level click metrics sourced from the
 * subscriber_clicks rollup (one row per email). Independent of the Sunday
 * Spotlight toggle since the underlying table doesn't carry campaign tags. */
function _renderSubscriberClickKpis(M) {
  const total = Number(M && M.total_article_clickers || 0);
  const r = (M && M.clicker_repeat) || {};
  const set = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };
  set('sc-kpi-total', total ? total.toLocaleString() : '—');
  set('sc-kpi-7d',    r.repeat_7d  != null ? Number(r.repeat_7d).toLocaleString()  : '—');
  set('sc-kpi-30d',   r.repeat_30d != null ? Number(r.repeat_30d).toLocaleString() : '—');
}

/* Click-volume distribution bar — buckets subscribers by their lifetime
 * unique-click count using the same boundaries the lambda emits:
 * 1, 2–5, 6–10, 11–20, 20+. */
function _renderClickBucketChart(M) {
  const b = (M && M.clicker_buckets) || {};
  const labels = ['1 click', '2–5 clicks', '6–10 clicks', '11–20 clicks', '20+ clicks'];
  const data   = [
    Number(b.b_1       || 0),
    Number(b.b_2_5     || 0),
    Number(b.b_6_10    || 0),
    Number(b.b_11_20   || 0),
    Number(b.b_20_plus || 0),
  ];
  const total = data.reduce((a,b)=>a+b, 0);
  const colors = ['#8250df','#0969da','#1a7f37','#bf8700','#cf222e'];
  const ctx = _resetCanvas('sc-bucket-bar');
  if (ctx) {
    ctx._chart = _newChart(ctx, {
      type: 'bar',
      data: { labels, datasets: [{
        label: 'Subscribers',
        data,
        backgroundColor: colors,
        borderWidth: 0,
        borderRadius: 4
      }]},
      options: { responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{ display:false },
          tooltip:{ callbacks:{
            label: (c) => {
              const pct = total ? (c.parsed.y / total * 100).toFixed(1) : '0.0';
              return `${Number(c.parsed.y).toLocaleString()} subscribers (${pct}%)`;
            }
          }}
        },
        scales:{ y:{ beginAtZero:true, ticks:{ callback: v => Number(v).toLocaleString() } } }
      }
    });
  }
  const ins = document.getElementById('sc-bucket-insight');
  if (ins) {
    if (!total) {
      ins.textContent = 'No subscriber-click data available yet.';
    } else {
      const oneOff = data[0];
      const repeat = total - oneOff;
      const pct = (n) => (n / total * 100).toFixed(1) + '%';
      ins.innerHTML = `${repeat.toLocaleString()} of ${total.toLocaleString()} subscribers (${pct(repeat)}) have clicked more than once. The 20+ tail holds ${data[4].toLocaleString()} highly engaged subscribers (${pct(data[4])}).`;
    }
  }
}

  }).join('');
}

        <thead><tr><th>Position</th><th>Pos Cat</th><th>Title</th><th title="The campaign / issue this article appeared in. One row per (article, issue) placement, so an article featured in multiple sends appears once per send.">Issue</th><th>Category</th><th>Tags</th><th>Author</th><th>Unique Clicks</th><th>Total Clicks</th></tr></thead>
        <tbody id="cr-tbody"></tbody>
      </table></div>
      <div id="cr-pager" style="display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:12px;font-size:12px;color:var(--text-muted);flex-wrap:wrap;"></div>
    </div>
  `;
  const rows = M.content_drill_table || [];
  window._crData = rows;
  window._crPage = 1;
  window._crPosCatChart = null;
  // Unique authors (single-valued)
  const authors = [...new Set(rows.map(_crAuthor).filter(Boolean))].sort();
  // Unique categories and tags — split on comma since RDS stores them as "longevity, health"
  const catSet = new Set();
  const tagSet = new Set();
  rows.forEach(r => {
    _crSplit(_crCategory(r)).forEach(c => catSet.add(c));
    _crSplit(_crTags(r)).forEach(t => tagSet.add(t));
  });
  const cats = [...catSet].sort();
  const tags = [...tagSet].sort();
  const authSel = document.getElementById('cr-author');
  authors.forEach(a => { const o=document.createElement('option'); o.value=a; o.textContent=a; authSel.appendChild(o); });
  const catSel = document.getElementById('cr-cat');
  cats.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=c; catSel.appendChild(o); });
  const tagSel = document.getElementById('cr-tag');
  tags.forEach(t => { const o=document.createElement('option'); o.value=t; o.textContent=t; tagSel.appendChild(o); });
  _crFilter();
}

function _crFilter() {
  const posCat = (document.getElementById('cr-poscat').value || '').toLowerCase();
  const pos    = document.getElementById('cr-pos').value;
  const author = document.getElementById('cr-author').value;
  const cat    = document.getElementById('cr-cat').value;
  const tag    = document.getElementById('cr-tag').value;
  const q      = (document.getElementById('cr-search').value||'').toLowerCase();
  let rows = window._crData || [];
  if (posCat) rows = rows.filter(r => _crPosCat(r) === posCat);
  if (pos !== '') {
    if (pos === '0') rows = rows.filter(r => !r.story_position || r.story_position === 0);
    else rows = rows.filter(r => String(r.story_position) === pos);
  }
  if (author) rows = rows.filter(r => _crAuthor(r) === author);
  if (cat)    rows = rows.filter(r => _crSplit(_crCategory(r)).includes(cat));
  if (tag)    rows = rows.filter(r => _crSplit(_crTags(r)).includes(tag));
  if (q) {
    // Search across every text field that a human-readable description of
    // the article might be in — title, issue name, author, category, tags.
    // Each row is matched if ANY field contains the query as a substring.
    rows = rows.filter(r => {
      const hay = [
        r.title, r.issue_name, _crAuthor(r), _crCategory(r), _crTags(r),
      ].map(x => String(x || '').toLowerCase()).join(' | ');
      return hay.includes(q);
    });
  }

  window._crFiltered = rows;
  window._crPage = 1;

  _crRenderKpis(rows);
  _crRenderPosCatChart(rows);
  _crRenderSleepers(rows);
  _crRenderTopBar('cr-cat-bar', 'cr-cat-insight', '_crCatBarChart', rows, _crCategory, 'category');
  // Top Tags honours a "minimum articles per tag" threshold so the average
  // isn't dominated by tags that appear on a single article. Default 1 = no
  // filter; the toolbar buttons (1/3/5/7/10) flip window._crTagMin and
  // re-call _crRenderTopBar via _crSetTagMin().
  _crRenderTopBar('cr-tag-bar', 'cr-tag-insight', '_crTagBarChart', rows, _crTags,     'tag', window._crTagMin || 1);
  _crRenderPage();

  const filtered = posCat || pos !== '' || author || cat || tag || q;
  const scope = document.getElementById('cr-scope-label');
  if (scope) scope.innerHTML = filtered
    ? `<strong style="color:var(--text);">${rows.length}</strong> articles in scope`
    : `<strong style="color:var(--text);">${rows.length}</strong> articles (all)`;
}

function _crRenderKpis(rows) {
  const n = rows.length;
  const uniq = rows.reduce((a,r) => a + (Number(r.unique_clicks)||0), 0);
  const tot  = rows.reduce((a,r) => a + (Number(r.total_clicks)||0), 0);
  const avg  = n ? (uniq / n) : 0;
  const set = (id, v) => { const el=document.getElementById(id); if (el) el.textContent = v; };
  set('cr-kpi-articles', fmt(n));
  set('cr-kpi-uniq',     fmt(uniq));
  set('cr-kpi-total',    fmt(tot));
  set('cr-kpi-avg',      avg ? avg.toFixed(1) : '—');
}

function _crAggregateBySplit(rows, accessor, minCount) {
  // Accumulate unique/total clicks + article count per split label
  // (categories/tags are comma-separated in WordPress). Pre-compute the
  // per-article averages so the Top Categories / Top Tags charts can plot
  // them directly without re-deriving on every render. `minCount` (default 1)
  // drops labels whose article count is below the threshold — used by the
  // Top Tags "Min articles" filter so tags that only appear on one article
  // don't dominate the avg-clicks ranking.
  const threshold = Math.max(1, Number(minCount) || 1);
  const acc = {};
  rows.forEach(r => {
    _crSplit(accessor(r)).forEach(label => {
      if (!acc[label]) acc[label] = { unique: 0, total: 0, count: 0 };
      acc[label].unique += Number(r.unique_clicks) || 0;
      acc[label].total  += Number(r.total_clicks)  || 0;
      acc[label].count  += 1;
    });
  });
  return Object.entries(acc)
    .filter(([, v]) => v.count >= threshold)
    .map(([label, v]) => ({
      label,
      unique:    v.unique,
      total:     v.total,
      count:     v.count,
      avgUnique: v.count ? Math.round(v.unique / v.count) : 0,
      avgTotal:  v.count ? Math.round(v.total  / v.count) : 0,
    }))
    .sort((a, b) => b.avgUnique - a.avgUnique)
    .slice(0, 10);
}

function _crSetTagMin(n) {
  window._crTagMin = Math.max(1, Number(n) || 1);
  [1, 3, 5, 7, 10].forEach(v => {
    const btn = document.getElementById('crtm-' + v);
    if (!btn) return;
    const active = v === window._crTagMin;
    btn.style.background = active ? 'var(--accent)' : 'var(--card)';
    btn.style.color      = active ? '#fff'          : 'var(--text-muted)';
  });
  const rows = window._crFiltered || [];
  _crRenderTopBar('cr-tag-bar', 'cr-tag-insight', '_crTagBarChart', rows, _crTags, 'tag', window._crTagMin);
}

function _crRenderTopBar(canvasId, insightId, chartKey, rows, accessor, noun, minCount) {
  const data = _crAggregateBySplit(rows, accessor, minCount);
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  if (window[chartKey]) window[chartKey].destroy();
  // Inline plugin: stamp "N articles" at the end of each Unique bar so the
  // user can see how many articles back each average.
  const countLabelPlugin = {
    id: 'countLabels-' + chartKey,
    afterDatasetsDraw(chart) {
      const meta = chart.getDatasetMeta(0);
      if (!meta || !meta.data) return;
      const c = chart.ctx;
      const isDark = document.body.classList.contains('dark');
      c.save();
      c.font = '10px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
      c.fillStyle = isDark ? '#8b949e' : '#57606a';
      c.textAlign = 'left';
      c.textBaseline = 'middle';
      meta.data.forEach((bar, i) => {
        if (i >= data.length) return;
        const d = data[i];
        c.fillText(`${d.count.toLocaleString()} article${d.count === 1 ? '' : 's'}`, bar.x + 6, bar.y);
      });
      c.restore();
    }
  };
  window[chartKey] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.label),
      datasets: [
        { label:'Avg Unique Clicks / Article', data: data.map(d => d.avgUnique), backgroundColor:'#1a7f37', borderRadius:4 },
        { label:'Avg Total Clicks / Article',  data: data.map(d => d.avgTotal),  backgroundColor:'#0969da', borderRadius:4 },
      ],
    },
    options: { responsive:true, maintainAspectRatio:false, indexAxis:'y',
      // Leave room on the right for the article-count label the plugin draws.
      layout: { padding: { right: 90 } },
      plugins:{ legend:{ position:'bottom', labels:{ font:{ size:11 } } },
                tooltip:{ callbacks:{ afterLabel: ctx => {
                  const d = data[ctx.dataIndex];
                  if (!d) return '';
                  return [
                    `${d.count.toLocaleString()} article${d.count === 1 ? '' : 's'}`,
                    `Totals: ${fmt(d.unique)} unique · ${fmt(d.total)} total clicks`
                  ];
                } } } },
      scales:{ x:{ beginAtZero:true, ticks:{ callback: v => v.toLocaleString() } } } },
    plugins: [countLabelPlugin]
  });
  const ins = document.getElementById(insightId);
  if (ins) {
    const threshold = Math.max(1, Number(minCount) || 1);
    const minNote = threshold > 1
      ? ` <span style="color:var(--text-muted);">(showing ${noun}s that appear in ≥ ${threshold} articles)</span>`
      : '';
    if (!data.length) {
      ins.innerHTML = threshold > 1
        ? `No ${noun} in scope appears in ≥ ${threshold} articles.`
        : `No ${noun} in scope.`;
    } else {
      const top = data[0];
      ins.innerHTML = `Top ${noun} by avg: <strong>${esc(top.label)}</strong> — avg ${fmt(top.avgUnique)} unique / ${fmt(top.avgTotal)} total clicks per article (${fmt(top.count)} article${top.count===1?'':'s'}, ${fmt(top.unique)} unique / ${fmt(top.total)} total clicks).${minNote}`;
    }
  }
}

function _crRenderPosCatChart(rows) {
  const order = ['high','medium','low'];
  const byCat = { high:{u:0,t:0,n:0}, medium:{u:0,t:0,n:0}, low:{u:0,t:0,n:0} };
  rows.forEach(r => {
    const k = _crPosCat(r);
    if (!byCat[k]) return;
    byCat[k].u += Number(r.unique_clicks)||0;
    byCat[k].t += Number(r.total_clicks)||0;
    byCat[k].n += 1;
  });
  const labels    = order.map(k => k.charAt(0).toUpperCase()+k.slice(1));
  const counts    = order.map(k => byCat[k].n);
  const uniqData  = order.map(k => byCat[k].u);
  const totalData = order.map(k => byCat[k].t);
  // Bars now show per-article averages (matches the Top Categories /
  // Top Tags charts). One decimal kept because the buckets are narrow
  // and rounding to ints would crush low-volume categories.
  const avgUnique = order.map((k,i) => counts[i] ? (uniqData[i]/counts[i])  : 0);
  const avgTotal  = order.map((k,i) => counts[i] ? (totalData[i]/counts[i]) : 0);
  // Plugin: write "N articles" above each Avg-Unique bar so the volume
  // backing each average is visible.
  const countLabelPlugin = {
    id: 'countLabels-poscat',
    afterDatasetsDraw(chart) {
      const meta = chart.getDatasetMeta(0);
      if (!meta || !meta.data) return;
      const c = chart.ctx;
      const isDark = document.body.classList.contains('dark');
      c.save();
      c.font = '10px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
      c.fillStyle = isDark ? '#8b949e' : '#57606a';
      c.textAlign = 'center';
      c.textBaseline = 'bottom';
      meta.data.forEach((bar, i) => {
        if (i >= counts.length) return;
        c.fillText(`${counts[i].toLocaleString()} article${counts[i] === 1 ? '' : 's'}`, bar.x, bar.y - 4);
      });
      c.restore();
    }
  };
  if (window._crPosCatChart) window._crPosCatChart.destroy();
  window._crPosCatChart = new Chart(document.getElementById('cr-poscat-bar'), {
    type: 'bar',
    data: { labels, datasets: [
      { label:'Avg Unique Clicks / Article', data: avgUnique, backgroundColor:'#1a7f37', borderRadius:4 },
      { label:'Avg Total Clicks / Article',  data: avgTotal,  backgroundColor:'#0969da', borderRadius:4 }
    ]},
    options: { responsive:true, maintainAspectRatio:false,
      // Top padding so the "N articles" plugin text doesn't get clipped.
      layout: { padding: { top: 18 } },
      plugins:{ legend:{position:'bottom',labels:{font:{size:11}}},
                tooltip:{callbacks:{
                  label: ctx => `${ctx.dataset.label}: ${Number(ctx.parsed.y).toLocaleString(undefined, {maximumFractionDigits:1})}`,
                  afterLabel: ctx => {
                    const i = ctx.dataIndex;
                    return [
                      `${counts[i].toLocaleString()} article${counts[i] === 1 ? '' : 's'}`,
                      `Totals: ${fmt(uniqData[i])} unique · ${fmt(totalData[i])} total clicks`
                    ];
                  }
                }} },
      scales:{ y:{ beginAtZero:true, ticks:{ callback: v => Number(v).toLocaleString() } } } },
    plugins: [countLabelPlugin]
  });
  const ins = document.getElementById('cr-poscat-insight');
  if (ins) {
    ins.innerHTML = order.map((k,i) =>
      `<strong style="color:${_crPosColors[k]}">${labels[i]}</strong>: ${counts[i]} article${counts[i]===1?'':'s'} &middot; avg ${avgUnique[i].toFixed(1)} unique / ${avgTotal[i].toFixed(1)} total clicks per article`
    ).join(' &nbsp;·&nbsp; ');
  }
}

function _crRenderSleepers(rows) {
  const sleepers = rows
    .filter(r => _crPosCat(r) === 'low')
    .slice()
    .sort((a,b) => (Number(b.unique_clicks)||0) - (Number(a.unique_clicks)||0))
    .slice(0, 10);
  const tbody = document.getElementById('cr-sleeper-tbody');
  if (!tbody) return;
  if (!sleepers.length) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:14px;">No low-position articles in scope.</td></tr>`;
    return;
  }
  tbody.innerHTML = sleepers.map((r,i) => {
    const titleCell = r.url
      ? `<a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title||'')}</a>`
      : esc(r.title||'');
    return `<tr>
      <td>${i+1}</td>
      <td>${titleCell}</td>
      <td>${r.story_position || '—'}</td>
      <td>${esc(_crCategory(r))}</td>
      <td>${fmt(r.unique_clicks)}</td>
    </tr>`;
  }).join('');
}

function _crGoto(p) {
  const total = (window._crFiltered||[]).length;
  const maxPage = Math.max(1, Math.ceil(total / CR_PAGE_SIZE));
  window._crPage = Math.min(Math.max(1, p), maxPage);
  _crRenderPage();
}

function _crRenderPage() {
  const rows = window._crFiltered || [];
  const total = rows.length;
  const page = window._crPage || 1;
  const pages = Math.max(1, Math.ceil(total / CR_PAGE_SIZE));
  const start = (page - 1) * CR_PAGE_SIZE;
  const end   = Math.min(start + CR_PAGE_SIZE, total);
  const slice = rows.slice(start, end);

  const countEl = document.getElementById('cr-count');
  if (countEl) countEl.textContent = `Showing ${total ? (start+1) : 0}–${end} of ${total.toLocaleString()} article${total===1?'':'s'}.`;

  const tbody = document.getElementById('cr-tbody');
  if (tbody) {
    tbody.innerHTML = slice.map(r => {
      const posCell = r.story_position ? fmt(r.story_position) : '<span style="color:var(--text-muted);font-style:italic;">No position</span>';
      const pc = _crPosCat(r);
      const pcCell = pc
        ? `<span style="color:${_crPosColors[pc]||'var(--text-muted)'};font-weight:600;text-transform:capitalize;">${pc}</span>`
        : '<span style="color:var(--text-muted);">—</span>';
      const titleCell = r.url
        ? `<a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title||'')}</a>`
        : esc(r.title||'');
      // Issue column — appended just after Title. Empty when the lambda
      // hasn't been re-run since `issue_name` was added to the JSON.
      const issueDate = (r.issue_date || '').slice(0, 10);
      const issueCell = r.issue_name
        ? `${esc(r.issue_name)}${issueDate ? ` <span style="color:var(--text-muted);font-size:11px;">(${esc(issueDate)})</span>` : ''}`
        : '<span style="color:var(--text-muted);">—</span>';
      return `<tr>
        <td>${posCell}</td>
        <td>${pcCell}</td>
        <td>${titleCell}</td>
        <td>${issueCell}</td>
        <td>${esc(_crCategory(r))}</td>
        <td>${esc(_crTags(r))}</td>
        <td>${esc(_crAuthor(r))}</td>
        <td>${fmt(r.unique_clicks)}</td>
        <td>${fmt(r.total_clicks)}</td>
      </tr>`;
    }).join('');
  }

  const pager = document.getElementById('cr-pager');
  if (pager) {
    const btn = (label, p, disabled, active) =>
      `<button class="camp-pager-btn${active?' active':''}" onclick="_crGoto(${p})" ${disabled?'disabled':''}>${label}</button>`;
    const numBtns = [];
    const windowSize = 7;
    let lo = Math.max(1, page - Math.floor(windowSize/2));
    let hi = Math.min(pages, lo + windowSize - 1);
    lo = Math.max(1, hi - windowSize + 1);
    for (let p=lo; p<=hi; p++) numBtns.push(btn(String(p), p, false, p===page));
    pager.innerHTML =
      `<span>Page ${page} of ${pages}</span>
       <div style="display:flex;gap:5px;flex-wrap:wrap;">
         ${btn('« First', 1, page===1)}${btn('‹ Prev', page-1, page===1)}
         ${numBtns.join('')}
         ${btn('Next ›', page+1, page===pages)}${btn('Last »', pages, page===pages)}
       </div>`;
  }
}

function _crReset() {
  ['cr-poscat','cr-pos','cr-author','cr-cat','cr-tag'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  const si = document.getElementById('cr-search'); if (si) si.value = '';
  _crFilter();
}

  // (Q20's utm_clicks_performance has separate counts; Q19's per-window
  // rows just have raw click events, so unique == total there).
  window._acqSource = (M.acquisition_quality && M.acquisition_quality.utm_source) || {};
  window._acqBarAllTime = M.utm_clicks_performance || null;
  window._M_total_subscribers = M.total_subscribers || 0;
  _setAcqWindow('all');
}

/* Single shared time-window driver for the whole Audience tab.
 * Updates: the four KPI cards (Total Subscribers / Top Source / Top Source %),
 * the Acquisition-by-Source doughnut, the Source Clicks Performance bar
 * chart, and the Acquisition Quality table. Reads windowed cohorts from
 * `M.acquisition_quality.utm_source.rows_all / rows_30d / rows_60d / rows_90d`
 * (Q19), and — for the "All time" view of the bar chart only — falls back
 * to `M.utm_clicks_performance` (Q20) so the Unique-vs-Total split is
 * preserved at that scale. */
function _setAcqWindow(win) {
  const src = window._acqSource || {};
  const map = { all: src.rows_all || src.rows || [],
                '30d': src.rows_30d || [],
                '60d': src.rows_60d || [],
                '90d': src.rows_90d || [] };
  const rows = map[win] || [];

  // Toggle button styles
  ['audw-all','audw-30','audw-60','audw-90'].forEach(id => {
    const btn = document.getElementById(id);
    if (!btn) return;
    const want = id.split('-')[1]; // all / 30 / 60 / 90
    const wantKey = want === 'all' ? 'all' : (want + 'd');
    const active = wantKey === win;
    btn.style.background = active ? 'var(--accent)' : 'var(--card)';
    btn.style.color      = active ? '#fff'          : 'var(--text-muted)';
  });
  const badge = document.getElementById('aud-window-badge');
  if (badge) badge.textContent = win === 'all'
    ? ' — all time'
    : ` — subscribers joined in last ${win.replace('d','')} days, clicks made in that window`;

  // Show churn columns only up to the selected window depth:
  //   all/90d → 30d + 60d + 90d visible
  //   60d     → 30d + 60d visible, 90d hidden
  //   30d     → 30d visible only, 60d + 90d hidden
  const showChurn = { '30': win === 'all' || win === '30d' || win === '60d' || win === '90d',
                      '60': win === 'all' || win === '60d' || win === '90d',
                      '90': win === 'all' || win === '90d' };
  const applyChurnVisibility = () => {
    document.querySelectorAll('.churn-col').forEach(el => {
      const depths = ['30','60','90'].filter(d => el.classList.contains('churn-'+d));
      // Each depth class on a cell/header means "show in that window".
      // The cell is visible if ANY of its depth classes is permitted.
      const visible = depths.length === 0 || depths.some(d => showChurn[d]);
      el.style.display = visible ? '' : 'none';
    });
  };
  applyChurnVisibility();

  // KPI cards — Total Subscribers, Top Source, Top Source %.
  // "Total Subscribers" is the source-table total (= subscribers with an
  // attribution row); for the all-time view that's smaller than M.total_subscribers
  // because organic / blank-utm fall into a single bucket. We still show
  // M.total_subscribers for the all-time view so the headline number matches
  // the Overview KPI; for windowed views we show the in-window cohort total.
  const total = rows.reduce((s, r) => s + (Number(r.subscribers) || 0), 0);
  const top   = rows[0] || {};
  const topName = top.label ? utmLabel(top.label) : '—';
  const topPct  = (total && top.subscribers) ? (top.subscribers / total * 100).toFixed(1) + '%' : '—';

  const subsEl    = document.getElementById('kpi-aud-subs');
  const subsLbl   = document.getElementById('kpi-aud-subs-sub');
  const subsLabel = document.getElementById('kpi-aud-subs-label');
  if (subsEl)    subsEl.textContent    = win === 'all'
                                          ? Number(window._M_total_subscribers || total).toLocaleString()
                                          : total.toLocaleString();
  if (subsLbl)   subsLbl.textContent   = win === 'all' ? 'All-time base' : `Joined in last ${win.replace('d','')} days`;
  if (subsLabel) subsLabel.textContent = win === 'all' ? 'Total Subscribers' : 'New Subscribers';
  const topSrcEl = document.getElementById('kpi-top-source');
  const topPctEl = document.getElementById('kpi-top-source-pct');
  if (topSrcEl) topSrcEl.textContent = topName;
  if (topPctEl) topPctEl.textContent = topPct;

  // Pie — Acquisition by Source
  if (window._audPieChart) {
    window._audPieChart.data.labels = rows.map(r => utmLabel(r.label));
    window._audPieChart.data.datasets[0].data = rows.map(r => Number(r.subscribers) || 0);
    window._audPieChart.update();
  }

  // Bar — Source Clicks Performance.
  // All-time: use utm_clicks_performance (proper unique vs total split).
  // Windowed: derive from the per-source rows where unique == total (raw
  // event count from Campaigns_Clicks). For the windowed view we still show
  // both series (with equal heights) so the chart shape is consistent.
  if (window._audBarChart) {
    if (win === 'all' && window._acqBarAllTime && (window._acqBarAllTime.labels||[]).length) {
      const uc = window._acqBarAllTime;
      window._audBarChart.data.labels = (uc.labels || []).map(utmLabel);
      window._audBarChart.data.datasets[0].data = uc.unique_clicks || [];
      window._audBarChart.data.datasets[1].data = uc.total_clicks  || [];
    } else {
      window._audBarChart.data.labels = rows.map(r => utmLabel(r.label));
      window._audBarChart.data.datasets[0].data = rows.map(r => Number(r.unique_clicks != null ? r.unique_clicks : r.clicks) || 0);
      window._audBarChart.data.datasets[1].data = rows.map(r => Number(r.non_unique_clicks != null ? r.non_unique_clicks : r.clicks) || 0);
    }
    window._audBarChart.update();
  }

  // Table
  const tbody = document.getElementById('aud-acq-tbody');
  if (!tbody) return;
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;color:var(--text-muted);padding:14px;">No data in this window yet — re-run the metrics lambda to populate.</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r => {
    const subs = Number(r.subscribers) || 0;
    const pct  = total ? (subs / total * 100).toFixed(1) + '%' : '—';
    const clk  = r.clicker_rate != null ? (typeof r.clicker_rate === 'string' ? r.clicker_rate : Number(r.clicker_rate).toFixed(1) + '%') : '—';
    const apc  = (r.avg_clicks_per_subscriber != null ? r.avg_clicks_per_subscriber : r.avg_unique_clicks_per_subscriber);
    const apcS = (apc != null && !Number.isNaN(Number(apc))) ? Number(apc).toFixed(2) : '—';
    const clicks = r.clicks != null ? r.clicks : r.unique_clicks;
    const c30  = (r.churned_30d_rate != null) ? `${Number(r.churned_30d_rate).toFixed(1)}% <span style="color:var(--text-muted);">(${fmt(r.churned_30d)})</span>` : '—';
    const c60  = (r.churned_60d_rate != null) ? `${Number(r.churned_60d_rate).toFixed(1)}% <span style="color:var(--text-muted);">(${fmt(r.churned_60d)})</span>` : '—';
    const c90  = (r.churned_90d_rate != null) ? `${Number(r.churned_90d_rate).toFixed(1)}% <span style="color:var(--text-muted);">(${fmt(r.churned_90d)})</span>` : '—';
    return `<tr><td>${utmLabel(r.label)}</td><td>${fmt(subs)}</td><td>${pct}</td><td>${fmt(r.clickers)}</td><td>${clk}</td><td>${fmt(clicks)}</td><td>${apcS}</td><td class="churn-col churn-30 churn-60 churn-90">${c30}</td><td class="churn-col churn-60 churn-90">${c60}</td><td class="churn-col churn-90">${c90}</td></tr>`;
  }).join('');
  // Re-apply: the tbody rewrite above creates fresh <td> nodes that lost the
  // hidden state set earlier in this function.
  applyChurnVisibility();
}

function renderRevenue(M) {

    </div>
    <div class="kpi-row">
      <div class="kpi-card gold"><div class="label">Total Line Amount</div><div class="value">${esc(M.total_line_amount_fmt||'—')}</div><div class="sub">Sum of <code>$_line_amount</code></div></div>
      <div class="kpi-card green"><div class="label">Total Deals</div><div class="value">${fmt(M.total_sponsor_deals)}</div><div class="sub">Sponsorship placements</div></div>
      <div class="kpi-card cyan"><div class="label">Avg Deal Size</div><div class="value">${esc(M.avg_deal_size_fmt||'—')}</div><div class="sub">Mean line amount per deal</div></div>
      <div class="kpi-card orange"><div class="label">Top Sponsor</div><div class="value" style="font-size:14px;">${esc(topName)}</div><div class="sub">By line amount</div></div>
    </div>
    <div class="grid-2">

        <div class="insight">Bars = <code>$_line_amount</code> sum per month (left axis). Line = number of deals (right axis). Faded bars are the current (in-progress) or not-yet-closed months.</div>
      </div>
      <div class="chart-card">
        <h3>Sponsor Type Distribution</h3>
        <div class="chart-container h340"><canvas id="rev-stype"></canvas></div>
        <div class="insight">Mix of sponsor types across the booked deals. Rows without a sponsor type are excluded everywhere in this tab.</div>
      </div>
    </div>
    <div class="chart-card">
      <h3>Top Sponsors</h3>
      <div class="tbl-wrap"><table class="dash-table">
        <thead><tr><th>#</th><th>Sponsor</th><th>Deals</th><th>Line Amount</th><th>Avg Line / Deal</th><th>Share of Total</th></tr></thead>
        <tbody>${ts.map((s,i)=>{
          const la = parseFloat((s.line_amount||'').replace(/[$,]/g,'')) || 0;
          const deals = s.deals || 1;
          const avgLa = la ? '$' + (la/deals).toLocaleString(undefined,{maximumFractionDigits:0}) : '—';
          const totalLa = parseFloat(M.total_line_amount) || 0;
          const share = (totalLa && la) ? (la/totalLa*100).toFixed(1)+'%' : '—';
          return `<tr><td>${i+1}</td><td>${esc(s.name||'')}</td><td>${fmt(s.deals)}</td><td>${esc(s.line_amount||'—')}</td><td>${avgLa}</td><td>${share}</td></tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>
  `;

  // Monthly line amount + deals — styled to match the Monthly Campaign Clicks
  // chart (single green bar series; current / future months use the same
  // colour but at 40% alpha to read as "in-progress"). The deals line stays
  // as one continuous overlay, no past/future split, no "Future →" label.
  const rm = M.line_amount_monthly || {labels:[],line_amount:[],deals:[]};
  const today = new Date();
  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
  const _MON = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const isInProgress = (lbl) => {
    // Parse "Mon YYYY" manually — new Date(string) is inconsistent on Safari/iOS.
    const p = (lbl || '').trim().split(/\s+/);
    if (p.length < 2 || !(_MON[p[0]] != null) || isNaN(+p[1])) return false;
    const d = new Date(+p[1], _MON[p[0]], 1);
    return d >= monthStart;
  };
  const BAR_COLOR = '#1a7f37';
  const laColors  = (rm.labels||[]).map(l => isInProgress(l) ? BAR_COLOR + '66' : BAR_COLOR);

    data: {
      labels: rm.labels||[],
      datasets: [
        { type:'bar', label:'Line Amount ($)', data: rm.line_amount||[],
          backgroundColor: laColors, borderColor: laBorders, borderWidth: 2, borderRadius: 4,
          yAxisID:'y' },
        { type:'line', label:'Deals', data: rm.deals||[],
          borderColor:'#0969da', backgroundColor:'transparent',
          tension:.25, pointRadius:3, yAxisID:'y1' }
      ]
    },
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'top', labels:{ font:{ size:11 } } } },
      scales:{
        y:  { position:'left',  beginAtZero:true, ticks:{ callback:v=>'$'+v.toLocaleString() } },
        y1: { position:'right', beginAtZero:true, grid:{ drawOnChartArea:false }, ticks:{ stepSize:1 } }
      } }
  });

  // Sponsor type distribution donut
  const st = M.sponsor_type_dist || {labels:[],data:[],colors:[]};
  new Chart(document.getElementById('rev-stype'), {
    type: 'doughnut',
    data: { labels: st.labels||[], datasets: [{ data: st.data||[], backgroundColor: st.colors || ['#0969da','#1a7f37','#8250df','#9a6700','#cf222e','#1b7c83','#bf3989'], borderWidth: 1 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ font:{ size:11 }, padding:8 } } } }
  });
}
